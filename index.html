<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbFz7cydDMjref2VRykU2Yq907KkIleHE",
  authDomain: "planner-eq.firebaseapp.com",
  projectId: "planner-eq",
  storageBucket: "planner-eq.firebasestorage.app",
  messagingSenderId: "55613790535",
  appId: "1:55613790535:web:58793f46981c48f2d45462",
  measurementId: "G-7H0DSJJV3J"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Expõe para o código global
window._fbAuth = auth;
window._fbDb = db;
window._fbProvider = provider;
window._fbSignInWithPopup = signInWithPopup;
window._fbSignOut = signOut;
window._fbOnAuthStateChanged = onAuthStateChanged;
window._fbDoc = doc;
window._fbSetDoc = setDoc;
window._fbGetDoc = getDoc;

// Monitora login
onAuthStateChanged(auth, user => {
  window._currentUser = user || null;
  if(typeof window._onAuthChange === 'function') window._onAuthChange(user);
});
</script>
<style>
:root{
  --bg:#f4f1ea;--surface:#fff;--surface2:#edeae2;--border:#ddd8ce;
  --ink:#1a1815;--ink2:#4d4840;--ink3:#a09890;
  --green:#005f3c;--green2:#e5f2ec;--green3:#003d27;
  --gold:#9a6f00;--gold2:#fdf3d6;
  --blue:#1c4f9c;--blue2:#e8f0fc;
  --red:#b03030;--red2:#fdeaea;
  --r:12px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:15px}

/* ── SHELL ── */
.shell{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;background:var(--bg)}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:relative;z-index:10;
}
.topbar-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--green);letter-spacing:-.3px}
.topbar-title{font-size:15px;font-weight:600;flex:1;text-align:center}
.topbar-badge{font-family:'DM Mono',monospace;font-size:10px;background:var(--green);color:#fff;border-radius:20px;padding:3px 9px;letter-spacing:.5px}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(64px + var(--safe-bottom))}

/* ── BOTTOM NAV ── */
.bottom-nav{
  flex-shrink:0;display:flex;
  background:var(--surface);border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
  position:relative;z-index:10;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border:none;background:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;
  color:var(--ink3);transition:color .15s;
}
.nav-btn .nav-ic{font-size:20px;line-height:1}
.nav-btn.active{color:var(--green)}
.nav-btn.active .nav-ic{transform:scale(1.1)}

/* ── PAGES ── */
.page{display:block;padding:16px}
.page.hidden{display:none!important}

/* ── SECTION HEADERS ── */
.sec-title{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--ink3);margin-bottom:10px;margin-top:4px;
}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3)}
.card-body{padding:14px}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.kpi-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.kpi-val{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:4px}
.kpi-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .5s}

/* ── PROGRESS ── */
.prog-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.prog-row:last-child{border-bottom:none}
.prog-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.prog-name{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-track{width:70px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;flex-shrink:0}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.prog-pct{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);width:26px;text-align:right;flex-shrink:0}

/* ── MINI WEEK BARS ── */
.mini-week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.mw-col{text-align:center}
.mw-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--ink3);margin-bottom:3px}
.mw-bar-wrap{height:32px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.mw-bar-fill{position:absolute;bottom:0;left:0;right:0;transition:height .4s}
.mw-val{font-family:'DM Mono',monospace;font-size:8px;color:var(--ink3);margin-top:2px}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.week-nav-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink2)}
.week-nav-btn:active{background:var(--surface2)}
.week-nav-label{flex:1;text-align:center;font-size:14px;font-weight:600;line-height:1.3}
.week-nav-label small{display:block;font-size:10px;color:var(--ink3);font-weight:400;font-family:'DM Mono',monospace;margin-top:2px}

/* ── TAB MODE ── */
.tab-strip{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:14px}
.tab-pill{flex:1;padding:7px;border-radius:8px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;text-align:center;transition:all .15s}
.tab-pill.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── WEEK SUMMARY BAR ── */
.week-sum{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:12px}
.week-sum-info{font-size:12px;color:var(--ink2)}
.week-sum-info strong{color:var(--ink);font-size:13px}
.week-sum-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.week-sum-fill{height:100%;border-radius:3px;transition:width .4s}
.week-sum-pct{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--green);flex-shrink:0}

/* ── DAY ACCORDION ── */
.day-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.day-block.today-day{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,95,60,.1)}
.day-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.day-header-left{flex:1}
.day-name-row{display:flex;align-items:center;gap:8px}
.day-name{font-weight:700;font-size:14px}
.day-date-str{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)}
.today-chip{background:var(--green);color:#fff;border-radius:20px;font-size:9px;padding:2px 7px;font-family:'DM Mono',monospace;letter-spacing:.5px}
.day-hrs-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);margin-top:2px}
.day-header-right{display:flex;align-items:center;gap:8px}
.day-chevron{font-size:13px;color:var(--ink3);transition:transform .2s}
.day-chevron.open{transform:rotate(180deg)}
.day-body{display:none;border-top:1px solid var(--border);padding:10px}
.day-body.open{display:block}

/* ── SLOT ITEMS ── */
.slot-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:9px;margin-bottom:6px;position:relative;cursor:pointer;transition:opacity .15s}
.slot-item:active{opacity:.75}
.slot-item.study   {background:var(--green2);border-left:3px solid var(--green)}
.slot-item.exercise{background:var(--gold2); border-left:3px solid var(--gold)}
.slot-item.review  {background:var(--blue2); border-left:3px solid var(--blue)}
.slot-item.rest    {background:var(--surface2);border-left:3px solid var(--border)}
.slot-item.done-slot{opacity:.5}
.slot-left{flex:1;min-width:0}
.slot-type-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.slot-item.study    .slot-type-label{color:var(--green)}
.slot-item.exercise .slot-type-label{color:var(--gold)}
.slot-item.review   .slot-type-label{color:var(--blue)}
.slot-item.rest     .slot-type-label{color:var(--ink3)}
.slot-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)}
.slot-title{font-size:12px;font-weight:700;line-height:1.35;margin:2px 0 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-mat{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px;color:#fff}
.slot-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.slot-done-icon{font-size:16px}
.slot-del{background:none;border:none;font-size:16px;color:var(--ink3);cursor:pointer;padding:0;line-height:1}

.add-slot-btn{
  width:100%;padding:9px;border:1.5px dashed var(--border);
  border-radius:9px;background:none;color:var(--ink3);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;text-align:center;transition:all .15s;margin-top:4px;
}
.add-slot-btn:active{border-color:var(--green);color:var(--green);background:var(--green2)}

/* ── PDF LIST ── */
.pdf-filters{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.pdf-filters input,.pdf-filters select{
  width:100%;padding:10px 12px;border:1px solid var(--border);
  border-radius:10px;background:var(--surface);color:var(--ink);
  font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
  -webkit-appearance:none;appearance:none;
}
.pdf-filters input::placeholder{color:var(--ink3)}
.pdf-filters input:focus,.pdf-filters select:focus{border-color:var(--green)}

.mat-section{margin-bottom:10px}
.mat-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;margin-bottom:3px}
.mat-swatch{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.mat-hdr-name{font-weight:700;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-hdr-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);background:var(--surface2);border-radius:20px;padding:2px 7px;flex-shrink:0}
.mat-hdr-pct{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--green);flex-shrink:0}

.pdf-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface)}
.pdf-row:last-child{border-bottom:none}
.pdf-row.done-row{opacity:.5}
.pdf-row.done-row .pdf-name{text-decoration:line-through;color:var(--ink3)}
.chk{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-size:12px}
.chk.on{background:var(--green);border-color:var(--green);color:#fff}
.pdf-info{flex:1;min-width:0}
.pdf-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdf-meta{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px}
.pdf-rows-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}

/* ── CHECKLIST ── */
.ck-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ck-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.ck-swatch{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.ck-title{font-weight:700;font-size:13px;flex:1}
.ck-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);font-weight:600;flex-shrink:0}
.ck-prog-bar{height:3px;background:var(--border);overflow:hidden}
.ck-prog-fill{height:100%;transition:width .3s}
.ck-body{display:none;padding:8px 12px}
.ck-body.open{display:block}
.ck-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ck-item:last-child{border-bottom:none}
.ck-item.done .ck-text{text-decoration:line-through;color:var(--ink3)}
.ck-text{font-size:13px;line-height:1.4;flex:1}

/* ── CONFIG ── */
.form-row{margin-bottom:14px}
.form-row label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.form-row input,.form-row select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;-webkit-appearance:none}
.form-row input:focus{border-color:var(--green)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;margin-bottom:10px}
.btn:active{opacity:.8}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn-danger{background:var(--red2);color:var(--red);border-color:#f0a8a8}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,24,21,.6);backdrop-filter:blur(3px);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 18px calc(20px + var(--safe-bottom));width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:18px}
.type-pills{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.type-pill{padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.type-pill.sel-study   {background:var(--green2);border-color:var(--green);color:var(--green)}
.type-pill.sel-exercise{background:var(--gold2); border-color:var(--gold); color:var(--gold)}
.type-pill.sel-review  {background:var(--blue2); border-color:var(--blue); color:var(--blue)}
.type-pill.sel-rest    {background:var(--surface2);border-color:var(--ink3);color:var(--ink2)}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:4px}
.modal-actions .btn{margin-bottom:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hidden{display:none!important}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--ink3)}
</style>
</head>
<body>
<!-- AUTH OVERLAY -->
<div id="auth-overlay" style="display:flex;position:fixed;inset:0;background:var(--bg);z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">
  <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--green);margin-bottom:6px">EQ</div>
  <div style="font-size:16px;font-weight:600;margin-bottom:4px">Planner EQ · Petrobras</div>
  <div style="font-size:13px;color:var(--ink3);margin-bottom:32px">Seu progresso salvo na nuvem</div>
  <button onclick="fbLogin()" style="display:flex;align-items:center;gap:10px;padding:13px 22px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:300px;justify-content:center">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
    Entrar com Google
  </button>
  <div id="auth-error" style="margin-top:16px;font-size:12px;color:var(--red);display:none"></div>
</div>

<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">EQ</div>
    <div class="topbar-title" id="pg-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="topbar-badge" id="sb-days-badge">—d</div>
      <img id="user-avatar" src="" alt="" onclick="fbLogout()" title="Sair" style="display:none;width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid var(--green);object-fit:cover">
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll" id="scroll-area">

    <!-- ── DASHBOARD ── -->
    <div class="page active" id="p-dash" style="padding-top:16px">
      <div class="kpi-row" id="kpis"></div>
      <div class="card">
        <div class="card-head"><span class="card-title">Progresso por Matéria</span></div>
        <div class="card-body" id="mat-prog"></div>
      </div>
      <div class="card">

// Storage: Firestore (nuvem) → localStorage (cache local)
const _mem={};
function _localStore(){
  try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return localStorage}catch(e){}
  try{sessionStorage.setItem('_t','1');sessionStorage.removeItem('_t');return sessionStorage}catch(e){}
  return{getItem:k=>_mem[k]||null,setItem:(k,v)=>{_mem[k]=v},removeItem:k=>{delete _mem[k]}};
}
const _st=_localStore();
const ldLocal=(k,d)=>{try{const v=_st.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const svLocal=(k,v)=>{try{_st.setItem(k,JSON.stringify(v))}catch(e){_mem[k]=JSON.stringify(v)}};

const S={

  weeks:ldLocal('eq_weeks',{}),
  wdone:ldLocal('eq_wdone',{}),
  checked:ldLocal('eq_ck',{}),
  cfg:ldLocal('eq_cfg',{examDate:'',metaHrs:3}),
  open:ldLocal('eq_open',{}),
};

function _saveLocal(){
  svLocal('eq_done',S.done);svLocal('eq_base',S.base);svLocal('eq_weeks',S.weeks);
  svLocal('eq_wdone',S.wdone);svLocal('eq_checked',S.checked);svLocal('eq_cfg',S.cfg);svLocal('eq_open',S.open);
}

let _cloudSaveTimer=null;
async function _saveCloud(){
  const user=window._currentUser;
  if(!user||!window._fbDb)return;
  try{
    const ref=window._fbDoc(window._fbDb,'planners',user.uid);
    await window._fbSetDoc(ref,{
      done:S.done,base:S.base,weeks:S.weeks,wdone:S.wdone,
      checked:S.checked,cfg:S.cfg,open:S.open,_v:Date.now()
    });
  }catch(e){console.warn('cloud save failed',e)}
}

const persist=()=>{
  _saveLocal();
  clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer=setTimeout(_saveCloud,1500);
};

async function _loadCloud(user){
  if(!user||!window._fbDb)return false;
  try{
    const ref=window._fbDoc(window._fbDb,'planners',user.uid);
    const snap=await window._fbGetDoc(ref);
    if(!snap.exists())return false;
    const d=snap.data();
    if(d.done)S.done=d.done;if(d.base)S.base=d.base;if(d.weeks)S.weeks=d.weeks;
    if(d.wdone)S.wdone=d.wdone;if(d.checked)S.checked=d.checked;if(d.cfg)S.cfg=d.cfg;
    if(d.open)S.open=d.open;
    _saveLocal();
    return true;
  }catch(e){console.warn('cloud load failed',e);return false}
}

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='planner_eq_backup.json';a.click();
  URL.revokeObjectURL(url);toast('✓ Backup baixado!');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.done)S.done=d.done;if(d.base)S.base=d.base;if(d.weeks)S.weeks=d.weeks;
        if(d.wdone)S.wdone=d.wdone;if(d.checked)S.checked=d.checked;if(d.cfg)S.cfg=d.cfg;
        persist();renderDash();toast('✓ Backup restaurado e sincronizado!');
      }catch{toast('⚠️ Arquivo inválido')}
    };r.readAsText(f);
  };inp.click();
}

// ═══ HELPERS ════════════════════════════════════════════════════
const fmtH=m=>{const h=Math.floor(m/60),n=m%60;return h?`${h}h${String(n).padStart(2,'0')}`:`${n}min`};
const fmtHrs=h=>{const hh=Math.floor(h),mm=Math.round((h-hh)*60);return hh?`${hh}h${String(mm).padStart(2,'0')}`:`${mm}min`};
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m};
const dur=b=>Math.max((t2m(b.end)-t2m(b.start))/60,0);
const toKey=d=>d.toISOString().slice(0,10);

function getMon(offset=0){
  // semana começa no Domingo (índice 0 = Dom)
  const d=new Date(),day=d.getDay();
  d.setDate(d.getDate()-day+offset*7);
  d.setHours(0,0,0,0);return d;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function weekKey(offset=0){
  const m=getMon(offset);
  return`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}

function getBlocks(dayIdx){dayIdx=String(dayIdx);
  if(activeTab==='base') return S.base[dayIdx]||[];
  const wk=weekKey(wkOffset);
  return S.weeks[wk]?.[dayIdx]??(S.base[dayIdx]||[]);
}
function setBlocks(dayIdx,bl){dayIdx=String(dayIdx);
  if(activeTab==='base'){S.base[dayIdx]=bl}
  else{const wk=weekKey(wkOffset);if(!S.weeks[wk])S.weeks[wk]={};S.weeks[wk][dayIdx]=bl}
  persist();
}
function doneKey(dayIdx,idx){return weekKey(wkOffset)+'-'+dayIdx+'-'+idx}

function weekStudyHrs(offset=0){
  let t=0;const wk=weekKey(offset);
  for(let d=0;d<7;d++){
    const bl=(S.weeks[wk]?.[String(d)])??(S.base[String(d)]||[]);
    bl.forEach((b,i)=>{if(b.type==='study'&&S.wdone[weekKey(offset)+'-'+d+'-'+i])t+=dur(b)});
  }
  return t;
}
function todayHrs(){
  const td=String(new Date().getDay()),wk=weekKey(0);
  const bl=(S.weeks[wk]?.[td])??(S.base[td]||[]);
  return bl.reduce((s,b,i)=>s+(b.type==='study'&&S.wdone[wk+'-'+td+'-'+i]?dur(b):0),0);
}

function updateTopbar(){
  if(S.cfg.examDate){
    const d=Math.ceil((new Date(S.cfg.examDate)-new Date())/86400000);
    document.getElementById('sb-days-badge').textContent=(d>0?d:0)+'d';
  }
}

// ═══ NAV ════════════════════════════════════════════════════════
let activeTab='base',wkOffset=0,selType2='study',modalCtx=null;

function nav(id,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  document.getElementById('p-'+id).classList.remove('hidden');
  document.getElementById('pg-title').textContent={dash:'Dashboard',week:'Grade Semanal',pdfs:'PDFs',checklist:'Tópicos',config:'Config'}[id];
  document.getElementById('scroll-area').scrollTop=0;
  ({dash:renderDash,week:()=>{renderWeek();if(activeTab==='week'&&wkOffset===0)setTimeout(scrollToToday,100);},pdfs:renderPDFs,checklist:renderChecklist,config:renderConfig})[id]();
  updateTopbar();
}

// ═══ DASHBOARD ══════════════════════════════════════════════════
function renderDash(){
  const tot=PDFS.length,dn=PDFS.filter(p=>S.done[p.name]).length,pct=Math.round(dn/tot*100);
  const mT=PDFS.reduce((s,p)=>s+p.mins,0),mD=PDFS.filter(p=>S.done[p.name]).reduce((s,p)=>s+p.mins,0);
  const mH=S.cfg.metaHrs||3,wkD=weekStudyHrs(),wkG=mH*5;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">Concluídos</div><div class="kpi-val" style="color:var(--green)">${dn}</div><div class="kpi-sub">de ${tot} PDFs</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%;background:var(--green)"></div></div></div>
    <div class="kpi"><div class="kpi-lbl">Progresso</div><div class="kpi-val">${pct}%</div><div class="kpi-sub">${tot-dn} restantes</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%;background:var(--ink)"></div></div></div>
    <div class="kpi"><div class="kpi-lbl">Restante</div><div class="kpi-val" style="color:var(--gold)">${Math.floor((mT-mD)/60)}h</div><div class="kpi-sub">≈${Math.ceil((mT-mD)/60/mH)} dias</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${100-pct}%;background:var(--gold)"></div></div></div>
    <div class="kpi"><div class="kpi-lbl">Semana</div><div class="kpi-val" style="color:var(--blue)">${wkD.toFixed(1)}h</div><div class="kpi-sub">meta ${wkG}h</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(wkD/wkG*100,100)}%;background:var(--blue)"></div></div></div>`;

  document.getElementById('mat-prog').innerHTML=MATS.map(m=>{
    const a=PDFS.filter(p=>p.mat===m),d2=a.filter(p=>S.done[p.name]).length,p2=Math.round(d2/a.length*100),c=COLORS[m]||'#005f3c';
    return`<div class="prog-row"><div class="prog-dot" style="background:${c}"></div><div class="prog-name">${m}</div><div class="prog-track"><div class="prog-fill" style="width:${p2}%;background:${c}"></div></div><div class="prog-pct">${p2}%</div></div>`;
  }).join('');

  const wkPct=Math.min(Math.round(wkD/wkG*100),100);
  document.getElementById('meta-pct').textContent=wkPct+'%';
  document.getElementById('meta-txt').textContent=`${wkD.toFixed(1)}h / ${wkG}h`;
  document.getElementById('meta-bar').style.width=wkPct+'%';

  const wk=weekKey(0);
  document.getElementById('mini-week').innerHTML=Array.from({length:7},(_,d)=>{
    const bl=(S.weeks[wk]?.[String(d)])??(S.base[String(d)]||[]);
    const dh=bl.reduce((s,b,i)=>s+(b.type==='study'&&S.wdone[wk+'-'+d+'-'+i]?dur(b):0),0);
    const ok=dh>=mH,pctH=Math.min(dh/mH*100,100);
    return`<div class="mw-col"><div class="mw-label">${DAYS[d]}</div><div class="mw-bar-wrap"><div class="mw-bar-fill" style="height:${pctH}%;background:${ok?'var(--green)':dh>0?'var(--gold)':'var(--surface2)'}"></div></div><div class="mw-val">${dh>0?dh.toFixed(1)+'h':'—'}</div></div>`;
  }).join('');

  const nxt=PDFS.filter(p=>!S.done[p.name]).slice(0,4);
  document.getElementById('next-pdfs').innerHTML=nxt.length?nxt.map(p=>{
    const c=COLORS[p.mat]||'#005f3c';
    return`<div class="card" style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px;padding:12px 14px"><div style="width:3px;height:32px;border-radius:2px;background:${c};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name.replace(/\.pdf$/i,'').replace(/_/g,' ')}</div><div style="font-size:10px;color:var(--ink3);margin-top:2px">${p.mat}</div></div><span class="tag">${fmtH(p.mins)}</span></div></div>`;
  }).join(''):'<div style="text-align:center;padding:20px;color:var(--ink3);font-size:14px">Todos concluídos 🎉</div>';
}

// ═══ GRADE SEMANAL ══════════════════════════════════════════════
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tab-base').classList.toggle('active',tab==='base');
  document.getElementById('tab-week').classList.toggle('active',tab==='week');
  document.getElementById('week-nav-wrap').classList.toggle('hidden',tab==='base');
  renderWeek();
}

function changeWeek(dir){
  wkOffset=dir===0?0:wkOffset+dir;
  renderWeek();
  if(wkOffset===0)setTimeout(scrollToToday,50);
}

function scrollToToday(){
  const todayStr=toKey(new Date());
  const todayDay=new Date().getDay(); // 0=Dom … 6=Sab
  const el=document.getElementById(`body-week-${todayDay}`);
  if(el){
    // open today's accordion if closed
    const key=`week-${todayDay}`;
    if(S.open[key]===false){S.open[key]=true;persist();renderWeek();}
    setTimeout(()=>{
      const block=document.querySelector('.day-block.today-day');
      if(block)block.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }
}

function renderWeek(){
  const isBase=activeTab==='base';
  const todayStr=toKey(new Date());
  const dates=Array.from({length:7},(_,i)=>isBase?null:addDays(getMon(wkOffset),i));

  // week label
  if(!isBase){
    const m=getMon(wkOffset),s=addDays(m,6);
    const f=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    const lbl=wkOffset===0?'Esta semana':wkOffset>0?`+${wkOffset} semana${wkOffset>1?'s':''}`:`${Math.abs(wkOffset)} semana${Math.abs(wkOffset)>1?'s':''} atrás`;
    document.getElementById('wk-label').innerHTML=`${lbl}<small>${f(m)} – ${f(s)}</small>`;
  }

  // summary
  const sw=document.getElementById('week-sum-wrap');
  if(isBase){
    let tp=0;for(let d=0;d<7;d++)(S.base[String(d)]||[]).forEach(b=>tp+=dur(b));
    sw.innerHTML=`<div class="week-sum"><div class="week-sum-info">Grade base: <strong>${tp.toFixed(1)}h/sem</strong></div><div style="font-size:11px;color:var(--ink3)">Repete toda semana</div></div>`;
  } else {
    const wk=weekKey(wkOffset),mH=S.cfg.metaHrs||3,goal=mH*5;
    let done=0,planned=0;
    for(let d=0;d<7;d++){
      const bl=(S.weeks[wk]?.[String(d)])??(S.base[String(d)]||[]);
      bl.forEach((b,i)=>{planned+=dur(b);if(b.type==='study'&&S.wdone[wk+'-'+d+'-'+i])done+=dur(b)});
    }
    const pct=Math.min(Math.round(done/goal*100),100);
    const fc=pct>=100?'var(--green)':pct>=60?'var(--gold)':'var(--red)';
    sw.innerHTML=`<div class="week-sum"><div class="week-sum-info"><strong>${done.toFixed(1)}h</strong> de <strong>${goal}h</strong></div><div class="week-sum-track"><div class="week-sum-fill" style="width:${pct}%;background:${fc}"></div></div><div class="week-sum-pct">${pct}%</div></div>`;
  }

  // days
  const cont=document.getElementById('days-container');
  cont.innerHTML='';

  for(let d=0;d<7;d++){
    const dateStr=!isBase&&dates[d]?toKey(dates[d]):'';
    const isToday=!isBase&&dateStr===todayStr;
    const blocks=getBlocks(d);
    const dayHrs=isBase?blocks.reduce((s,b)=>s+dur(b),0):blocks.reduce((s,b,i)=>s+(b.type==='study'&&S.wdone[weekKey(wkOffset)+'-'+d+'-'+i]?dur(b):0),0);
    const isOpen=S.open[`${activeTab}-${d}`]!==false; // default open

    const dayDiv=document.createElement('div');
    dayDiv.className='day-block'+(isToday?' today-day':'');

    const dateDisplay=!isBase&&dates[d]?dates[d].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):'';
    const plannedHrs=blocks.reduce((s,b)=>s+dur(b),0);
    const hrsLabel=isBase?`${plannedHrs.toFixed(1)}h planejado`:dayHrs>0?`${dayHrs.toFixed(1)}h concluído · ${plannedHrs.toFixed(1)}h planejado`:blocks.length>0?`${plannedHrs.toFixed(1)}h planejado`:'sem registros';

    dayDiv.innerHTML=`
      <div class="day-header" onclick="toggleDay('${activeTab}-${d}')">
        <div class="day-header-left">
          <div class="day-name-row">
            <div class="day-name">${DAYS[d]}</div>
            ${dateDisplay?`<div class="day-date-str">${dateDisplay}</div>`:''}
            ${isToday?'<div class="today-chip">HOJE</div>':''}
          </div>
          <div class="day-hrs-badge">${hrsLabel} · ${blocks.length} bloco${blocks.length!==1?'s':''}</div>
        </div>
        <div class="day-header-right">
          <div class="day-chevron ${isOpen?'open':''}" id="chv-${activeTab}-${d}">▼</div>
        </div>
      </div>
      <div class="day-body ${isOpen?'open':''}" id="body-${activeTab}-${d}">
        ${blocks.map((b,bi)=>renderSlot(b,bi,d,!isBase)).join('')}
        <button class="add-slot-btn" onclick="openModal(${d})">+ Adicionar bloco</button>
      </div>`;
    cont.appendChild(dayDiv);
  }
}

function toggleDay(key){
  S.open[key]=S.open[key]===false?true:(S.open[key]===true?false:false);
  // if undefined default was open, clicking closes
  if(S.open[key]===undefined)S.open[key]=false;
  persist();
  const body=document.getElementById('body-'+key);
  const chv=document.getElementById('chv-'+key);
  if(body){body.classList.toggle('open');chv.classList.toggle('open',body.classList.contains('open'))}
}

function renderSlot(b,bi,dayIdx,weekMode){
  const icons={study:'📖',exercise:'✏️',review:'🔁',rest:'💤'};
  const labels={study:'Estudo',exercise:'Exercício',review:'Revisão',rest:'Descanso'};
  const wk=weekKey(wkOffset);
  const dk=wk+'-'+dayIdx+'-'+bi;
  const isDone=weekMode&&S.wdone[dk];
  const needsPDF=weekMode&&b.type==='study'&&!b.pdfName;
  let title;
  if(b.pdfName){
    title=b.pdfName.replace(/\.pdf$/i,'').replace(/_/g,' ').substring(0,45);
  } else if(needsPDF){
    title='Toque para escolher o PDF…';
  } else if(!weekMode&&b.type==='study'&&b.mat){
    title=b.mat; // base slot: show matéria name as title
  } else {
    title=b.desc||'';
  }
  const pdfMat=b.pdfName?(PDFS.find(p=>p.name===b.pdfName)?.mat||''):'';
  const sub=pdfMat||b.mat||'';
  const subColor=sub?COLORS[sub]||'#005f3c':'';
  // clicking: if needs PDF → open assign modal; else toggle done
  const onclick=weekMode
    ?(needsPDF?`assignPDF(${dayIdx},${bi})`:`toggleSlotDone(${dayIdx},${bi})`)
    :'';
  const titleStyle=needsPDF?'color:var(--ink3);font-style:italic':'';
  return`<div class="slot-item ${b.type}${isDone?' done-slot':''}" onclick="${onclick}">
    <div class="slot-left">
      <div class="slot-type-label">${icons[b.type]} ${labels[b.type]}</div>
      <div class="slot-time">${b.start} – ${b.end} · ${dur(b).toFixed(1)}h</div>
      <div class="slot-title" style="${titleStyle}">${title||'—'}</div>
      ${sub?`<div class="slot-mat" style="background:${subColor}">${sub}</div>`:''}
    </div>
    <div class="slot-right">
      <div class="slot-done-icon">${isDone?'✅':(needsPDF?'📝':'')}</div>
      <button class="slot-del" onclick="event.stopPropagation();delSlot(${dayIdx},${bi})">🗑</button>
    </div>
  </div>`;
}

function toggleSlotDone(dayIdx,bi){
  const wk=weekKey(wkOffset),dk=wk+'-'+dayIdx+'-'+bi;
  const blocks=getBlocks(dayIdx);
  if(!blocks[bi])return;
  S.wdone[dk]=!S.wdone[dk];
  if(!S.wdone[dk])delete S.wdone[dk];
  if(S.wdone[dk]&&blocks[bi].type==='study'&&blocks[bi].pdfName){
    S.done[blocks[bi].pdfName]=true;
    toast('📖 PDF concluído!');
  }
  persist();renderWeek();
}

function delSlot(dayIdx,bi){
  const bl=[...getBlocks(dayIdx)];bl.splice(bi,1);
  setBlocks(dayIdx,bl);renderWeek();toast('Bloco removido');
}

// ═══ MODAL ══════════════════════════════════════════════════════
function assignPDF(dayIdx,bi){
  const blocks=getBlocks(dayIdx);
  const b=blocks[bi];if(!b)return;
  modalCtx={dayIdx,isBase:false,editIdx:bi};
  selType2=b.type;
  document.getElementById('modal-title').textContent='Escolher PDF';
  document.querySelectorAll('.type-pill').forEach(p=>{p.classList.remove('sel-study','sel-exercise','sel-review','sel-rest');p.disabled=true;});
  document.querySelector(`.type-pill[data-t="${b.type}"]`).classList.add('sel-'+b.type);
  document.getElementById('m-start').value=b.start;
  document.getElementById('m-end').value=b.end;
  document.getElementById('m-desc').value=b.desc||'';
  document.getElementById('m-week-mat').innerHTML='<option value="">— Todas as matérias —</option>'+MATS.map(m=>`<option value="${m}">${m}</option>`).join('');
  const preMat=b.mat||'';
  document.getElementById('m-week-mat').value=preMat;
  _populatePDFSelect(preMat);
  if(b.pdfName)document.getElementById('m-pdf').value=b.pdfName;
  _updateModalFields();
  document.getElementById('modal').classList.add('open');
}

function openModal(dayIdx){
  const isBase=activeTab==='base';
  modalCtx={dayIdx,isBase,editIdx:null};
  selType2='study';
  document.getElementById('modal-title').textContent=isBase?'Novo bloco (Grade Base)':'Novo bloco';
  document.querySelectorAll('.type-pill').forEach(p=>{p.classList.remove('sel-study','sel-exercise','sel-review','sel-rest');p.disabled=false;});
  document.querySelector('.type-pill[data-t="study"]').classList.add('sel-study');
  document.getElementById('m-desc').value='';
  document.getElementById('m-mat').innerHTML='<option value="">— Selecione —</option>'+MATS.map(m=>`<option value="${m}">${m}</option>`).join('');
  document.getElementById('m-week-mat').innerHTML='<option value="">— Todas as matérias —</option>'+MATS.map(m=>`<option value="${m}">${m}</option>`).join('');
  if(!isBase)_populatePDFSelect('');
  _updateModalFields();
  document.getElementById('modal').classList.add('open');
}

function _updateModalFields(){
  const isBase=modalCtx&&modalCtx.isBase;
  const isStudy=selType2==='study';
  const isRest=selType2==='rest';
  // Grade Base: matéria picker always visible
  document.getElementById('m-mat-row').classList.toggle('hidden', !isBase);
  // update label: obrigatória for study, opcional for others
  const lbl=document.getElementById('m-mat-label');
  if(lbl)lbl.innerHTML=isStudy
    ?'Matéria <span style="color:var(--red);font-size:11px">*</span>'
    :'Matéria <span style="font-weight:400;opacity:.6">(opcional)</span>';
  // Por Semana: matéria+pdf only for study
  document.getElementById('m-week-mat-row').classList.toggle('hidden', isBase||!isStudy);
  document.getElementById('m-pdf-row').classList.toggle('hidden', isBase||!isStudy);
  // desc for non-study non-rest in week mode
  document.getElementById('m-desc-row').classList.toggle('hidden', isBase||isStudy||isRest);
}

function onMatChange(){
  // nothing extra needed for base mode
}

function onWeekMatChange(){
  const mat=document.getElementById('m-week-mat').value;
  _populatePDFSelect(mat);
}

function _populatePDFSelect(filterMat){
  const sel=document.getElementById('m-pdf');
  sel.innerHTML='<option value="">— Selecione —</option>';
  const pool=filterMat?PDFS.filter(p=>p.mat===filterMat):PDFS;
  pool.filter(p=>!S.done[p.name]).forEach(p=>{
    const o=document.createElement('option');o.value=p.name;
    o.textContent=p.name.replace(/\.pdf$/i,'').replace(/_/g,' ').substring(0,46)+` (${fmtH(p.mins)})`;
    sel.appendChild(o);
  });
  const done=pool.filter(p=>S.done[p.name]);
  if(done.length){
    const og=document.createElement('optgroup');og.label='— Concluídos —';
    done.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=p.name.replace(/\.pdf$/i,'').replace(/_/g,' ').substring(0,46);og.appendChild(o)});
    sel.appendChild(og);
  }
}

function selType(btn){
  selType2=btn.dataset.t;
  document.querySelectorAll('.type-pill').forEach(p=>p.classList.remove('sel-study','sel-exercise','sel-review','sel-rest'));
  btn.classList.add('sel-'+selType2);
  _updateModalFields();
  // when switching to study in week mode, reload PDFs for current matéria selection
  if(selType2==='study'&&modalCtx&&!modalCtx.isBase){
    const mat=document.getElementById('m-week-mat').value;
    _populatePDFSelect(mat);
  }
}

function addBlock(){
  const start=document.getElementById('m-start').value,end=document.getElementById('m-end').value;
  if(!start||!end||t2m(end)<=t2m(start)){toast('⚠️ Horário inválido');return}

  const isBase=modalCtx&&modalCtx.isBase;
  const editIdx=modalCtx?.editIdx;
  let pdfName='',desc='',mat='';

  if(isBase){
    mat=document.getElementById('m-mat').value;
    if(selType2==='study'&&!mat){toast('⚠️ Selecione a matéria para o bloco de estudo');return}
  } else {
    if(selType2==='study'){
      mat=document.getElementById('m-week-mat').value;
      pdfName=document.getElementById('m-pdf').value;
      if(!pdfName){toast('⚠️ Selecione um PDF');return}
      if(!mat)mat=(PDFS.find(p=>p.name===pdfName)||{}).mat||'';
    } else if(selType2!=='rest'){
      desc=document.getElementById('m-desc').value.trim();
      if(!desc){toast('⚠️ Descreva a atividade');return}
    }
  }

  const bl=[...getBlocks(modalCtx.dayIdx)];
  if(editIdx!=null&&bl[editIdx]){
    // editing existing slot — update pdfName and mat, keep other fields
    bl[editIdx]={...bl[editIdx],pdfName,desc,mat,start,end};
  } else {
    bl.push({type:selType2,start,end,pdfName,desc,mat});
    bl.sort((a,b)=>t2m(a.start)-t2m(b.start));
  }
  setBlocks(modalCtx.dayIdx,bl);
  closeModal();renderWeek();toast(editIdx!=null?'✓ PDF atribuído!':'✓ Adicionado!');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.querySelectorAll('.type-pill').forEach(p=>p.disabled=false);
}

// ═══ PDFs ════════════════════════════════════════════════════════
function renderPDFs(){
  const q=(document.getElementById('pdf-q')?.value||'').toLowerCase();
  const mat=document.getElementById('pdf-mat')?.value||'';
  const st=document.getElementById('pdf-st')?.value||'';
  const sel=document.getElementById('pdf-mat');
  if(sel&&sel.options.length===1)MATS.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
  const cont=document.getElementById('pdf-cont');cont.innerHTML='';
  const grouped={};
  PDFS.forEach(p=>{
    if(mat&&p.mat!==mat)return;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.mat.toLowerCase().includes(q))return;
    if(st==='done'&&!S.done[p.name])return;
    if(st==='pending'&&S.done[p.name])return;
    if(!grouped[p.mat])grouped[p.mat]=[];
    grouped[p.mat].push(p);
  });
  Object.keys(grouped).sort().forEach(m=>{
    const pdfs=grouped[m],dn=pdfs.filter(p=>S.done[p.name]).length,pct=Math.round(dn/pdfs.length*100),c=COLORS[m]||'#005f3c';
    const k='ms-'+btoa(encodeURIComponent(m)).replace(/[^a-zA-Z0-9]/g,'');
    const wrap=document.createElement('div');wrap.className='mat-section';
    wrap.innerHTML=`
      <div class="mat-hdr" onclick="toggleMs('${k}')">
        <div class="mat-swatch" style="background:${c}"></div>
        <div class="mat-hdr-name">${m}</div>
        <span class="mat-hdr-badge">${dn}/${pdfs.length}</span>
        <span class="mat-hdr-pct">${pct}%</span>
      </div>
      <div class="pdf-rows-wrap" id="${k}">
        ${pdfs.map(p=>{
          const dn2=!!S.done[p.name];
          return`<div class="pdf-row${dn2?' done-row':''}">
            <div class="chk${dn2?' on':''}" onclick="togDone('${p.name.replace(/'/g,"\\'")}')">
              ${dn2?'✓':''}
            </div>
            <div class="pdf-info">
              <div class="pdf-name">${p.name.replace(/\.pdf$/i,'').replace(/_/g,' ')}</div>
              <div class="pdf-meta">${p.pages} pág · ${fmtH(p.mins)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    cont.appendChild(wrap);
  });
}
function toggleMs(k){const el=document.getElementById(k);if(el)el.style.display=el.style.display==='none'?'':'none'}
function togDone(name){S.done[name]=!S.done[name];if(!S.done[name])delete S.done[name];persist();renderPDFs();toast(S.done[name]?'✓ Concluído!':'Desmarcado')}

// ═══ CHECKLIST ══════════════════════════════════════════════════
function renderChecklist(){
  document.getElementById('ck-cont').innerHTML=Object.entries(TOPICS).map(([m,topics])=>{
    const c=COLORS[m]||'#005f3c';
    const dn=topics.filter(t=>S.checked[m+'::'+t]).length,pct=Math.round(dn/topics.length*100);
    const k='ck-'+btoa(encodeURIComponent(m)).replace(/[^a-zA-Z0-9]/g,'');
    return`<div class="ck-card">
      <div class="ck-head" onclick="toggleCkBody('${k}')">
        <div class="ck-swatch" style="background:${c}"></div>
        <div class="ck-title">${m}</div>
        <div class="ck-pct">${pct}%</div>
      </div>
      <div class="ck-prog-bar"><div class="ck-prog-fill" style="width:${pct}%;background:${c}"></div></div>
      <div class="ck-body" id="${k}">
        ${topics.map(t=>{const done=!!S.checked[m+'::'+t];return`<div class="ck-item${done?' done':''}" onclick="togCk('${m.replace(/'/g,"\\'")}','${t.replace(/'/g,"\\'")}')"><div class="chk${done?' on':''}" style="width:18px;height:18px;flex-shrink:0;margin-top:1px;font-size:11px">${done?'✓':''}</div><div class="ck-text">${t}</div></div>`}).join('')}
      </div>
    </div>`;
  }).join('');
}
function toggleCkBody(k){const el=document.getElementById(k);if(el)el.classList.toggle('open')}
function togCk(m,t){const k=m+'::'+t;S.checked[k]=!S.checked[k];if(!S.checked[k])delete S.checked[k];persist();renderChecklist()}

// ═══ CONFIG ══════════════════════════════════════════════════════
function renderConfig(){
  document.getElementById('cfg-date').value=S.cfg.examDate||'';
  document.getElementById('cfg-hrs').value=S.cfg.metaHrs||3;
}
function saveConfig(){
  S.cfg.examDate=document.getElementById('cfg-date')?.value||S.cfg.examDate;
  S.cfg.metaHrs=parseFloat(document.getElementById('cfg-hrs')?.value||3);
  persist();updateTopbar();
}
function clearAll(){S.done={};S.weeks={};S.wdone={};S.checked={};persist();toast('✓ Dados limpos!');renderDash()}

// ═══ TOAST ══════════════════════════════════════════════════════
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// ═══ INIT ═══════════════════════════════════════════════════════
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});
