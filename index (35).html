<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planner EQ">
<meta name="theme-color" content="#005f3c">
<title>Planner EQ · Petrobras</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbFz7cydDMjref2VRykU2Yq907KkIleHE",
  authDomain: "planner-eq.firebaseapp.com",
  projectId: "planner-eq",
  storageBucket: "planner-eq.firebasestorage.app",
  messagingSenderId: "55613790535",
  appId: "1:55613790535:web:58793f46981c48f2d45462",
  measurementId: "G-7H0DSJJV3J"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Expõe para o código global
window._fbAuth = auth;
window._fbDb = db;
window._fbProvider = provider;
window._fbSignInWithPopup = signInWithPopup;
window._fbSignOut = signOut;
window._fbOnAuthStateChanged = onAuthStateChanged;
window._fbDoc = doc;
window._fbSetDoc = setDoc;
window._fbGetDoc = getDoc;

// Monitora login
onAuthStateChanged(auth, user => {
  window._currentUser = user || null;
  if(typeof window._onAuthChange === 'function') window._onAuthChange(user);
});
</script>
<style>
:root{
  --bg:#f4f1ea;--surface:#fff;--surface2:#edeae2;--border:#ddd8ce;
  --ink:#1a1815;--ink2:#4d4840;--ink3:#a09890;
  --green:#005f3c;--green2:#e5f2ec;--green3:#003d27;
  --gold:#9a6f00;--gold2:#fdf3d6;
  --blue:#1c4f9c;--blue2:#e8f0fc;
  --red:#b03030;--red2:#fdeaea;
  --purple:#6b35c2;--purple2:#f0ebfa;
  --r:12px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:16px}

/* ── SHELL ── */
.shell{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;background:var(--bg)}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:relative;z-index:10;
}
.topbar-logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--green);letter-spacing:-.3px}
.topbar-title{font-size:16px;font-weight:600;flex:1;text-align:center}
.topbar-badge{font-family:'DM Mono',monospace;font-size:11px;background:var(--green);color:#fff;border-radius:20px;padding:3px 9px;letter-spacing:.5px}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(64px + var(--safe-bottom))}

/* ── BOTTOM NAV ── */
.bottom-nav{
  flex-shrink:0;display:flex;
  background:var(--surface);border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
  position:relative;z-index:10;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border:none;background:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  color:var(--ink3);transition:color .15s;
}
.nav-btn .nav-ic{font-size:20px;line-height:1}
.nav-btn.active{color:var(--green)}
.nav-btn.active .nav-ic{transform:scale(1.1)}

/* ── SIDEBAR wrapper (mobile: hidden, tablet+: visible) ── */
.sidebar{display:contents} /* no mobile, topbar e nav ficam no fluxo normal */

/* ── TABLET (≥768px) ── */
@media(min-width:768px){
  html,body{overflow:hidden}
  .shell{
    flex-direction:row;max-width:100%;height:100vh;overflow:hidden;
  }
  .sidebar{
    display:flex;flex-direction:column;
    width:200px;min-width:200px;flex-shrink:0;
    background:var(--surface);border-right:1px solid var(--border);
    height:100%;
  }
  /* topbar vira cabeçalho da sidebar */
  .topbar{
    flex-direction:column;align-items:flex-start;justify-content:flex-start;
    width:100%;border-bottom:1px solid var(--border);border-right:none;
    padding:20px 14px 14px;gap:4px;flex-shrink:0;height:auto;
  }
  .topbar-logo{font-size:22px;margin-bottom:2px}
  .topbar-title{display:none}
  .topbar-badge{margin-top:4px;font-size:10px}
  /* nav ocupa o resto da sidebar */
  .bottom-nav{
    flex:1;flex-direction:column;align-items:stretch;
    width:100%;border-top:none;border-right:none;
    padding:10px 8px 20px;gap:2px;
    justify-content:flex-start;
  }
  .nav-btn{
    flex:none;flex-direction:row;justify-content:flex-start;
    gap:10px;padding:10px 12px;font-size:13px;
    border-radius:9px;width:100%;text-align:left;
  }
  .nav-btn .nav-ic{font-size:17px;width:20px;text-align:center}
  .nav-btn.active{background:var(--green2);color:var(--green)}
  /* conteúdo principal */
  .scroll{
    flex:1;height:100vh;padding-bottom:16px;overflow-y:auto;
  }
  .page{padding:20px 28px;max-width:900px}
  .kpi-row{grid-template-columns:repeat(4,1fr)}
  .overlay{align-items:center}
  .modal{border-radius:18px;max-width:520px;margin:auto}
}

/* ── DESKTOP (≥1200px) ── */
@media(min-width:1200px){
  .sidebar{width:240px;min-width:240px}
  .topbar{padding:28px 16px 16px}
  .topbar-logo{font-size:24px}
  .bottom-nav{padding:12px 12px 28px}
  .nav-btn{padding:11px 14px;font-size:14px}
  .page{padding:28px 40px;max-width:1100px}
  .kpi-row{gap:14px}
  #days-container{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .day-block{margin-bottom:0}
}

/* ── PAGES ── */
.page{display:block;padding:16px}
.page.hidden{display:none!important}

/* ── CALENDÁRIO ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:4px}
.cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--ink3);padding:6px 0;text-transform:uppercase}
.cal-cell{
  aspect-ratio:1;border-radius:10px;border:1.5px solid var(--border);
  background:var(--surface);display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  font-size:15px;font-weight:600;position:relative;transition:all .15s;
  padding:4px;gap:2px;
}
.cal-cell:active{transform:scale(.93)}
.cal-cell.other-month{opacity:.2;pointer-events:none}
.cal-cell.no-base{opacity:.3;pointer-events:none}
.cal-cell.today{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,95,60,.15)}
.cal-cell.has-blocks{background:var(--green2);border-color:var(--green)}
.cal-cell.all-done{background:var(--green);border-color:var(--green3);color:#fff}
.cal-cell.skipped{background:var(--red2);border-color:var(--red)}
.cal-cell.selected{outline:3px solid var(--ink);outline-offset:1px}
.cal-hrs{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);line-height:1}
.cal-cell.has-blocks .cal-hrs{color:var(--green3)}
.cal-cell.all-done .cal-hrs{color:rgba(255,255,255,.85)}
.cal-cell.skipped .cal-hrs{color:var(--red)}

/* ── SECTION HEADERS ── */
.sec-title{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--ink3);margin-bottom:10px;margin-top:4px;
}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3)}
.card-body{padding:14px}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.kpi-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.kpi-val{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:4px}
.kpi-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .5s}

/* ── PROGRESS ── */
.prog-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.prog-row:last-child{border-bottom:none}
.prog-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.prog-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-track{width:70px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;flex-shrink:0}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.prog-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);width:26px;text-align:right;flex-shrink:0}

/* ── MINI WEEK BARS ── */
.mini-week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}.mini-week>div:first-child{grid-column:1/-1}
.mw-col{text-align:center}
.mw-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--ink3);margin-bottom:3px}
.mw-bar-wrap{height:32px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.mw-bar-fill{position:absolute;bottom:0;left:0;right:0;transition:height .4s}
.mw-val{font-family:'DM Mono',monospace;font-size:8px;color:var(--ink3);margin-top:2px}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.week-nav-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink2)}
.week-nav-btn:active{background:var(--surface2)}
.week-nav-label{flex:1;text-align:center;font-size:14px;font-weight:600;line-height:1.3}
.week-nav-label small{display:block;font-size:10px;color:var(--ink3);font-weight:400;font-family:'DM Mono',monospace;margin-top:2px}

/* ── TAB MODE ── */
.tab-strip{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:14px}
.tab-pill{flex:1;padding:7px;border-radius:8px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;text-align:center;transition:all .15s}
.tab-pill.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── WEEK SUMMARY BAR ── */
.week-sum{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:12px}
.week-sum-info{font-size:12px;color:var(--ink2)}
.week-sum-info strong{color:var(--ink);font-size:13px}
.week-sum-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.week-sum-fill{height:100%;border-radius:3px;transition:width .4s}
.week-sum-pct{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--green);flex-shrink:0}

/* ── DAY ACCORDION ── */
.day-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.day-block.today-day{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,95,60,.1)}
.day-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.day-header-left{flex:1}
.day-name-row{display:flex;align-items:center;gap:8px}
.day-name{font-weight:700;font-size:15px}
.day-date-str{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3)}
.today-chip{background:var(--green);color:#fff;border-radius:20px;font-size:10px;padding:2px 7px;font-family:'DM Mono',monospace;letter-spacing:.5px}
.day-hrs-badge{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);margin-top:2px}
.day-header-right{display:flex;align-items:center;gap:8px}
.day-chevron{font-size:13px;color:var(--ink3);transition:transform .2s}
.day-chevron.open{transform:rotate(180deg)}
.day-body{display:none;border-top:1px solid var(--border);padding:10px}
.day-body.open{display:block}

/* ── SLOT ITEMS ── */
.slot-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:9px;margin-bottom:6px;position:relative;cursor:pointer;transition:opacity .15s}
.slot-item:active{opacity:.75}
.slot-item.study   {background:var(--green2);border-left:3px solid var(--green)}
.slot-item.exercise{background:var(--gold2); border-left:3px solid var(--gold)}
.slot-item.review  {background:var(--blue2); border-left:3px solid var(--blue)}
.slot-item.rest    {background:var(--surface2);border-left:3px solid var(--border)}
.slot-item.notes   {background:var(--purple2);border-left:3px solid var(--purple)}
.slot-item.done-slot{opacity:.5}
.slot-left{flex:1;min-width:0}
.slot-type-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.slot-item.study    .slot-type-label{color:var(--green)}
.slot-item.exercise .slot-type-label{color:var(--gold)}
.slot-item.review   .slot-type-label{color:var(--blue)}
.slot-item.rest     .slot-type-label{color:var(--ink3)}
.slot-item.notes    .slot-type-label{color:var(--purple)}
.slot-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3)}
.slot-title{font-size:13px;font-weight:700;line-height:1.35;margin:2px 0 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-mat{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px;color:#fff}
.slot-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.slot-done-icon{font-size:16px}
.slot-del{background:none;border:none;font-size:16px;color:var(--ink3);cursor:pointer;padding:0;line-height:1}

.add-slot-btn{
  width:100%;padding:9px;border:1.5px dashed var(--border);
  border-radius:9px;background:none;color:var(--ink3);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;text-align:center;transition:all .15s;margin-top:4px;
}
.add-slot-btn:active{border-color:var(--green);color:var(--green);background:var(--green2)}

/* ── PDF LIST ── */
.pdf-filters{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.pdf-filters input,.pdf-filters select{
  width:100%;padding:10px 12px;border:1px solid var(--border);
  border-radius:10px;background:var(--surface);color:var(--ink);
  font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
  -webkit-appearance:none;appearance:none;
}
.pdf-filters input::placeholder{color:var(--ink3)}
.pdf-filters input:focus,.pdf-filters select:focus{border-color:var(--green)}

.mat-section{margin-bottom:10px}
.mat-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;margin-bottom:3px}
.mat-swatch{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.mat-hdr-name{font-weight:700;font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-hdr-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);background:var(--surface2);border-radius:20px;padding:2px 7px;flex-shrink:0}
.mat-hdr-pct{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--green);flex-shrink:0}

.pdf-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface)}
.pdf-row:last-child{border-bottom:none}
.pdf-row.done-row{opacity:.5}
.pdf-row.done-row .pdf-name{text-decoration:line-through;color:var(--ink3)}
.chk{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-size:12px}
.chk.on{background:var(--green);border-color:var(--green);color:#fff}
.pdf-info{flex:1;min-width:0}
.pdf-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdf-meta{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px}
.pdf-rows-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}

/* ── CHECKLIST ── */
.ck-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ck-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.ck-swatch{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.ck-title{font-weight:700;font-size:13px;flex:1}
.ck-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);font-weight:600;flex-shrink:0}
.ck-prog-bar{height:3px;background:var(--border);overflow:hidden}
.ck-prog-fill{height:100%;transition:width .3s}
.ck-body{display:none;padding:8px 12px}
.ck-body.open{display:block}
.ck-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ck-item:last-child{border-bottom:none}
.ck-item.done .ck-text{text-decoration:line-through;color:var(--ink3)}
.ck-text{font-size:13px;line-height:1.4;flex:1}

/* ── CONFIG ── */
.form-row{margin-bottom:14px}
.form-row label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.form-row input,.form-row select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;-webkit-appearance:none}
.form-row input:focus{border-color:var(--green)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;margin-bottom:10px}
.btn:active{opacity:.8}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn-danger{background:var(--red2);color:var(--red);border-color:#f0a8a8}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,24,21,.6);backdrop-filter:blur(3px);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 18px calc(20px + var(--safe-bottom));width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:18px}
.type-pills{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.type-pill{padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.type-pill.sel-study   {background:var(--green2);border-color:var(--green);color:var(--green)}
.type-pill.sel-exercise{background:var(--gold2); border-color:var(--gold); color:var(--gold)}
.type-pill.sel-review  {background:var(--blue2); border-color:var(--blue); color:var(--blue)}
.type-pill.sel-rest    {background:var(--surface2);border-color:var(--ink3);color:var(--ink2)}
.type-pill.sel-notes   {background:var(--purple2);border-color:var(--purple);color:var(--purple)}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:4px}
.modal-actions .btn{margin-bottom:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hidden{display:none!important}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--ink3)}
</style>

      <button class="nav-btn active" onclick="nav('dash',this)"><span class="nav-ic">▦</span>Dash</button>

      <button class="nav-btn" onclick="nav('cal',this)"><span class="nav-ic">🗓</span>Calendário</button>
      <button class="nav-btn" onclick="nav('pdfs',this)"><span class="nav-ic">📄</span>PDFs</button>

  </div>

        </div>
      </div>
      <div id="estimativa-card"></div>
      <div class="sec-title">Próximos PDFs</div>
      <div id="next-pdfs"></div>
    </div>

    <!-- ── GRADE SEMANAL ── -->
    <div class="page hidden" id="p-week">

      <div id="week-nav-wrap">
        <div class="week-nav">
          <button class="week-nav-btn" onclick="changeWeek(-1)">←</button>

          <button class="week-nav-btn" onclick="changeWeek(0)">Hoje</button>
          <button class="week-nav-btn" onclick="changeWeek(1)">→</button>
        </div>
      </div>
      <div id="week-sum-wrap"></div>
      <div id="days-container"></div>
    </div>

    <!-- ── PDFs ── -->
    <div class="page hidden" id="p-pdfs">

      </div>
      <div id="pdf-cont"></div>
    </div>
    </div>

</div><!-- /shell -->

  </div>
</div>

// Storage: Firestore (nuvem) → localStorage (cache local)
const _mem={};
function _localStore(){
  try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return localStorage}catch(e){}
  try{sessionStorage.setItem('_t','1');sessionStorage.removeItem('_t');return sessionStorage}catch(e){}
  return{getItem:k=>_mem[k]||null,setItem:(k,v)=>{_mem[k]=v},removeItem:k=>{delete _mem[k]}};
}
const _st=_localStore();
const ldLocal=(k,d)=>{try{const v=_st.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const svLocal=(k,v)=>{try{_st.setItem(k,JSON.stringify(v))}catch(e){_mem[k]=JSON.stringify(v)}};

let _cloudSaveTimer=null;
async function _saveCloud(){
  const user=window._currentUser;
  if(!user||!window._fbDb)return;
  try{
    const ref=window._fbDoc(window._fbDb,'planners',user.uid);
    await window._fbSetDoc(ref,{
      done:S.done,base:S.base,weeks:S.weeks,wdone:S.wdone,
      checked:S.checked,cfg:S.cfg,open:S.open,_v:Date.now()
    });
  }catch(e){console.warn('cloud save failed',e)}
}

const persist=()=>{
  _saveLocal();
  clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer=setTimeout(_saveCloud,1500);
};

async function _loadCloud(user){
  if(!user||!window._fbDb)return false;
  try{
    const ref=window._fbDoc(window._fbDb,'planners',user.uid);
    const snap=await window._fbGetDoc(ref);
    if(!snap.exists())return false;
    const d=snap.data();
    if(d.done)S.done=d.done;if(d.base)S.base=d.base;if(d.weeks)S.weeks=d.weeks;
    if(d.wdone)S.wdone=d.wdone;if(d.checked)S.checked=d.checked;if(d.cfg)S.cfg=d.cfg;
    if(d.open)S.open=d.open;
    _saveLocal();
    return true;
  }catch(e){console.warn('cloud load failed',e);return false}
}

const fmtH=m=>{const h=Math.floor(m/60),n=m%60;return h?`${h}h${String(n).padStart(2,'0')}`:`${n}min`};
const fmtHrs=h=>{const hh=Math.floor(h),mm=Math.round((h-hh)*60);return hh?`${hh}h${String(mm).padStart(2,'0')}`:`${mm}min`};
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m};
const dur=b=>Math.max((t2m(b.end)-t2m(b.start))/60,0);
const toKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

function getMon(offset=0){
  // semana começa no Domingo (índice 0 = Dom)
  const d=new Date(),day=d.getDay();
  d.setDate(d.getDate()-day+offset*7);
  d.setHours(0,0,0,0);return d;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function weekKey(offset=0){
  const m=getMon(offset);
  return`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}

// ── DELTA MODEL ─────────────────────────────────────────────────
// S.weeks[wk][dayIdx] = { deleted:[...baseIdxs], extra:[...blocks com _id] }
// Semana atual/futuras: herdam grade base dinamicamente + delta
// Semanas passadas: idem (só não se atualizam mais retroativamente, mas herdam base se sem delta)

function _getDelta(wk,dayIdx){
  dayIdx=String(dayIdx);
  const d=(S.weeks[wk]&&S.weeks[wk][dayIdx]);
  if(!d||Array.isArray(d)) return {deleted:[],extra:[]};
  return {deleted:d.deleted||[],extra:d.extra||[]};
}

function _setDelta(wk,dayIdx,delta){
  dayIdx=String(dayIdx);
  if(!S.weeks[wk])S.weeks[wk]={};
  S.weeks[wk][dayIdx]=delta;
}

function _newId(){return Math.random().toString(36).slice(2,8)}

function getBlocks(dayIdx){
  dayIdx=String(dayIdx);
  if(activeTab==='base') return S.base[dayIdx]||[];
  const wk=weekKey(wkOffset);
  return _resolveBlocks(wk,dayIdx);
}

function _resolveBlocks(wk,dayIdx){
  dayIdx=String(dayIdx);
  const delta=_getDelta(wk,dayIdx);
  const base=S.base[dayIdx]||[];
  const baseFiltered=base.map((b,i)=>({...b,_baseIdx:i})).filter(b=>!delta.deleted.includes(b._baseIdx));
  const extras=(delta.extra||[]).map(b=>({...b}));
  return [...baseFiltered,...extras].sort((a,b2)=>t2m(a.start)-t2m(b2.start));
}

function setBlocks(dayIdx,bl){
  // Apenas para grade base
  dayIdx=String(dayIdx);
  S.base[dayIdx]=bl;
  persist();
}

function doneKey(dayIdx,b){
  const wk=weekKey(wkOffset),sd=String(dayIdx);
  if(b&&b._id) return wk+'-'+sd+'-x-'+b._id;
  if(b&&b._baseIdx!==undefined) return wk+'-'+sd+'-b-'+b._baseIdx;
  return wk+'-'+sd+'-?';
}

function weekStudyHrs(offset=0){
  let t=0;const wk=weekKey(offset);
  for(let d=0;d<7;d++){
    const bl=_resolveBlocks(wk,String(d));
    bl.forEach(b=>{
      if(b.type==='study'||b.type==='review'||b.type==='exercise'||b.type==='notes'){
        const dk=_doneKeyForWeek(wk,String(d),b);
        if(S.wdone[dk])t+=dur(b);
      }
    });
  }
  return t;
}

function _doneKeyForWeek(wk,sd,b){
  if(b._id) return wk+'-'+sd+'-x-'+b._id;
  if(b._baseIdx!==undefined) return wk+'-'+sd+'-b-'+b._baseIdx;
  return wk+'-'+sd+'-?';
}

function todayHrs(){
  const td=String(new Date().getDay()),wk=weekKey(0);
  const bl=_resolveBlocks(wk,td);
  return bl.reduce((s,b)=>s+((b.type==='study'||b.type==='review'||b.type==='exercise'||b.type==='notes')&&S.wdone[_doneKeyForWeek(wk,td,b)]?dur(b):0),0);
}

    const dsPct=Math.min(ds/base*100,100),drPct=Math.min(dr/base*100,100),dePct=Math.min(de/base*100,100),dnPct=Math.min(dn/base*100,100);
    const label=ph>0?(dh>0?dh.toFixed(1)+'h':ph.toFixed(1)+'h'):'—';
    const plannedBars=`<div style="position:absolute;bottom:0;left:0;right:0;height:${psPct}%;background:var(--green2);border-radius:3px"></div><div style="position:absolute;bottom:${psPct}%;left:0;right:0;height:${prPct}%;background:var(--blue2);border-radius:3px"></div><div style="position:absolute;bottom:${psPct+prPct}%;left:0;right:0;height:${pePct}%;background:var(--gold2);border-radius:3px"></div><div style="position:absolute;bottom:${psPct+prPct+pePct}%;left:0;right:0;height:${pnPct}%;background:var(--purple2);border-radius:3px"></div>`;
    const doneBars=`<div style="position:absolute;bottom:0;left:0;right:0;height:${dsPct}%;background:var(--green);border-radius:3px"></div><div style="position:absolute;bottom:${dsPct}%;left:0;right:0;height:${drPct}%;background:var(--blue);border-radius:3px"></div><div style="position:absolute;bottom:${dsPct+drPct}%;left:0;right:0;height:${dePct}%;background:var(--gold);border-radius:3px"></div><div style="position:absolute;bottom:${dsPct+drPct+dePct}%;left:0;right:0;height:${dnPct}%;background:var(--purple);border-radius:3px"></div>`;
    return`<div class="mw-col"><div class="mw-label">${DAYS[d]}</div><div class="mw-bar-wrap" style="position:relative">${plannedBars}${doneBars}</div><div class="mw-val">${label}</div></div>`;
  }).join('');

  // ── Resumo semanal por tipo ──
  let totPS=0,totPR=0,totPE=0,totPN=0,totDS=0,totDR=0,totDE=0,totDN=0;
  for(let d=0;d<7;d++){
    const bl=_resolveBlocks(wk,String(d));
    bl.forEach(b=>{
      const dk=_doneKeyForWeek(wk,String(d),b);
      const done=!!S.wdone[dk];
      if(b.type==='study'){totPS+=dur(b);if(done)totDS+=dur(b);}
      if(b.type==='review'){totPR+=dur(b);if(done)totDR+=dur(b);}
      if(b.type==='exercise'){totPE+=dur(b);if(done)totDE+=dur(b);}
      if(b.type==='notes'){totPN+=dur(b);if(done)totDN+=dur(b);}
    });
  }
  const typeRow=(label,color,done,planned)=>{
    const pct=planned>0?Math.min(Math.round(done/planned*100),100):0;
    return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:2px;background:${color};flex-shrink:0"></div>
      <div style="font-size:12px;flex:1">${label}</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3)">${done.toFixed(1)}h<span style="color:var(--ink3);opacity:.5"> / ${planned.toFixed(1)}h</span></div>
      <div style="width:48px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0"><div style="height:100%;width:${pct}%;background:${color};border-radius:2px"></div></div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;width:26px;text-align:right;color:${color};flex-shrink:0">${pct}%</div>
    </div>`;
  };
  document.getElementById('week-type-summary').innerHTML=`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:4px">
    ${typeRow('Estudo','var(--green)',totDS,totPS)}
    ${typeRow('Revisão','var(--blue)',totDR,totPR)}
    ${typeRow('Exercício','var(--gold)',totDE,totPE)}
    ${totPN>0?`<div style="border-bottom:none">${typeRow('Anotações','var(--purple)',totDN,totPN).replace('border-bottom:1px solid var(--border)','')}</div>`:''}
  </div>`;

  const nxt=PDFS.filter(p=>!S.done[p.name]).slice(0,4);
  document.getElementById('next-pdfs').innerHTML=nxt.length?nxt.map(p=>{
    const c=COLORS[p.mat]||'#005f3c';
    return`<div class="card" style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px;padding:12px 14px"><div style="width:3px;height:32px;border-radius:2px;background:${c};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name.replace(/\.pdf$/i,'').replace(/_/g,' ')}</div><div style="font-size:10px;color:var(--ink3);margin-top:2px">${p.mat}</div></div><span class="tag">${fmtH(p.mins)}</span></div></div>`;
  }).join(''):'<div style="text-align:center;padding:20px;color:var(--ink3);font-size:14px">Todos concluídos 🎉</div>';

  // ── Estimativa de conclusão ──
  const estEl=document.getElementById('estimativa-card');
  const minsLeft=mT-mD;
  const hrsLeft=minsLeft/60;
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const fmtDt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.',' ');

  // Ritmo = grade base (blocos study, sem deltas de semana)
  const baseStudyHrs=(()=>{let t=0;for(let d=0;d<7;d++){(S.base[String(d)]||[]).forEach(b=>{if(b.type==='study')t+=dur(b);});}return t;})();

  // Horas de estudo planejadas numa semana aplicando deltas do "Por Semana"
  // (blocos deletados individualmente e dias pulados reduzem o total)
  function _hrsPlannedWeek(wkKey){
    let t=0;
    for(let d=0;d<7;d++){
      if(_isDaySkipped(wkKey,d))continue;
      const bl=_resolveBlocks(wkKey,String(d));
      bl.forEach(b=>{if(b.type==='study')t+=dur(b);});
    }
    return t; // pode ser 0 se a semana toda foi pulada/esvaziada
  }

  if(hrsLeft<=0){estEl.innerHTML='';}
  else if(baseStudyHrs<=0&&!S.cfg.startDate){estEl.innerHTML='';}
  else {
    const temStartDate=!!S.cfg.startDate&&new Date(S.cfg.startDate+'T00:00:00')<=hoje;
    const startDate=temStartDate?new Date(S.cfg.startDate+'T00:00:00'):null;

    // Ponto de partida: domingo da semana de startDate (ou semana atual se sem startDate)
    let curSunday=new Date(hoje);
    curSunday.setDate(hoje.getDate()-hoje.getDay());
    if(startDate){
      curSunday=new Date(startDate);
      curSunday.setDate(startDate.getDate()-startDate.getDay());
    }
    curSunday.setHours(0,0,0,0);

    let hrsAcum=0,dtFim=null,hrsStudiedSince=0;

    for(let w=0;w<500;w++){
      const wkStart=new Date(curSunday);wkStart.setDate(curSunday.getDate()+w*7);
      const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);
      const wkKey2=`${wkStart.getFullYear()}-${String(wkStart.getMonth()+1).padStart(2,'0')}-${String(wkStart.getDate()).padStart(2,'0')}`;

      const isPast=wkEnd<hoje;
      const isCurrent=wkStart<=hoje&&wkEnd>=hoje;

      let hrsEstaSemana=0;

      if(isPast){
        // Semana passada: conta só o que foi realmente marcado como concluído
        for(let d=0;d<7;d++){
          const dayDate=new Date(wkStart);dayDate.setDate(wkStart.getDate()+d);
          if(startDate&&dayDate<startDate)continue;
          if(dayDate>hoje)continue;
          const bl=_resolveBlocks(wkKey2,String(d));
          bl.forEach(b=>{
            if(b.type==='study'){
              const dk=_doneKeyForWeek(wkKey2,String(d),b);
              if(S.wdone[dk])hrsEstaSemana+=dur(b);
            }
          });
        }
        hrsStudiedSince+=hrsEstaSemana;

      } else if(isCurrent){
        // Semana atual:
        //   dias já passados (inclusive hoje) → real concluído
        //   dias futuros → planejado no Por Semana (com deltas: blocos deletados e dias pulados = 0)
        let realSoFar=0,plannedRemaining=0;
        for(let d=0;d<7;d++){
          const dayDate=new Date(wkStart);dayDate.setDate(wkStart.getDate()+d);
          if(startDate&&dayDate<startDate)continue;
          if(dayDate<=hoje){
            // passado/hoje: real concluído (dia pulado contribui 0, correto)
            const bl=_resolveBlocks(wkKey2,String(d));
            bl.forEach(b=>{
              if(b.type==='study'){
                const dk=_doneKeyForWeek(wkKey2,String(d),b);
                if(S.wdone[dk])realSoFar+=dur(b);
              }
            });
          } else {
            // futuro: planejado com deltas (dia pulado = skip, bloco deletado = não aparece em _resolveBlocks)
            if(_isDaySkipped(wkKey2,d))continue;
            const bl=_resolveBlocks(wkKey2,String(d));
            bl.forEach(b=>{if(b.type==='study')plannedRemaining+=dur(b);});
          }
        }
        hrsEstaSemana=realSoFar+plannedRemaining;
        hrsStudiedSince+=realSoFar;

      } else {
        // Semana futura: planejado com deltas aplicados
        hrsEstaSemana=_hrsPlannedWeek(wkKey2);
        // Se não há delta registrado para essa semana futura, usa a grade base
        if(hrsEstaSemana<=0)hrsEstaSemana=baseStudyHrs;
      }

      // Se hrsEstaSemana ainda for 0 (semana atual/passada sem nada), avança sem acumular
      if(hrsEstaSemana<=0)continue;

      hrsAcum+=hrsEstaSemana;
      if(hrsAcum>=hrsLeft){
        const frac=1-((hrsAcum-hrsLeft)/hrsEstaSemana);
        const baseDay=isCurrent?hoje:wkStart;
        const diasRestNaSemana=isCurrent?(wkEnd-hoje)/86400000:7;
        const diasOffset=Math.round(frac*diasRestNaSemana);
        dtFim=new Date(baseDay);dtFim.setDate(baseDay.getDate()+diasOffset);
        break;
      }
    }
    if(!dtFim){dtFim=new Date(hoje);dtFim.setDate(hoje.getDate()+999);}

    const diasNec=Math.round((dtFim-hoje)/86400000);
    const dtFimStr=fmtDt(dtFim);
    const semanasDecorridas=startDate?Math.max(1,(hoje-startDate)/86400000/7):1;
    const ritmoRealSem=temStartDate?(hrsStudiedSince/semanasDecorridas):baseStudyHrs;
    // Ritmo exibido = grade base (independente do histórico real)
    const ritmoExibido=baseStudyHrs;
    const ritmoInfo=`${ritmoExibido.toFixed(1)}h/sem · grade base`;

    let status='',cor='',icon='',extra='';
    if(S.cfg.examDate){
      const prova=new Date(S.cfg.examDate+'T12:00:00');
      const diffDias=Math.round((prova-dtFim)/86400000);
      if(diffDias>=14){status='Confortável';cor='var(--green)';icon='🟢';extra=`${diffDias} dias de folga · ${ritmoInfo}`;}
      else if(diffDias>=0){status='Apertado';cor='var(--gold)';icon='🟡';extra=`${diffDias===0?'No dia da prova':diffDias+' dias antes'} · ${ritmoInfo}`;}
      else{
        status='Inviável no ritmo atual';cor='var(--red)';icon='🔴';
        const diasDisp=Math.max(1,Math.round((prova-hoje)/86400000));
        const hrsNec=((hrsLeft/diasDisp)*7).toFixed(1);
        extra=`Necessário: ${hrsNec}h de estudo/sem · seu ritmo: ${ritmoExibido.toFixed(1)}h/sem`;
      }
    } else {
      status='Estimativa';cor='var(--blue)';icon='📅';extra=ritmoInfo;
    }
    estEl.innerHTML=`<div class="card" style="margin-bottom:12px;border-left:3px solid ${cor}">
      <div class="card-body" style="padding:14px">
        <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px">Estimativa de Conclusão</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:20px">${icon}</div>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700;color:${cor}">${status}</div>
            <div style="font-size:13px;font-weight:600;margin-top:1px">Termina em ${dtFimStr} <span style="font-weight:400;color:var(--ink3);font-size:12px">(${diasNec} dias)</span></div>
            <div style="font-size:11px;color:var(--ink3);margin-top:3px;font-family:'DM Mono',monospace">${extra}</div>
          </div>
        </div>
      </div>
    </div>`;
  }
}

// ═══ GRADE SEMANAL ══════════════════════════════════════════════
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tab-base').classList.toggle('active',tab==='base');
  document.getElementById('tab-week').classList.toggle('active',tab==='week');
  document.getElementById('week-nav-wrap').classList.toggle('hidden',tab==='base');
  renderWeek();
}

function changeWeek(dir){
  wkOffset=dir===0?0:wkOffset+dir;
  renderWeek();
  if(wkOffset===0)setTimeout(scrollToToday,120);
}

function scrollToToday(){
  const todayDay=new Date().getDay();
  // fecha todos os dias da semana atual, abre só hoje
  for(let d=0;d<7;d++){S.open[`week-0-${d}`]=d===todayDay;}
  persist();
  renderWeek();
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const block=document.querySelector('.day-block.today-day');
      if(block){
        const scroll=document.getElementById('scroll-area');
        if(scroll){
          scroll.scrollTo({top:block.offsetTop-8,behavior:'smooth'});
        } else {
          block.scrollIntoView({behavior:'smooth',block:'start'});
        }
      }
    });
  });
}

function renderWeek(){
  const isBase=activeTab==='base';
  const todayStr=toKey(new Date());
  const dates=Array.from({length:7},(_,i)=>isBase?null:addDays(getMon(wkOffset),i));

  // week label
  if(!isBase){
    const m=getMon(wkOffset),s=addDays(m,6);
    const f=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    const lbl=wkOffset===0?'Esta semana':wkOffset>0?`+${wkOffset} semana${wkOffset>1?'s':''}`:`${Math.abs(wkOffset)} semana${Math.abs(wkOffset)>1?'s':''} atrás`;
    document.getElementById('wk-label').innerHTML=`${lbl}<small>${f(m)} – ${f(s)}</small>`;
  }

  // summary
  const sw=document.getElementById('week-sum-wrap');
  if(isBase){
    let tp=0;for(let d=0;d<7;d++)(S.base[String(d)]||[]).forEach(b=>tp+=dur(b));
    sw.innerHTML=`<div class="week-sum"><div class="week-sum-info">Grade base: <strong>${tp.toFixed(1)}h/sem</strong></div><div style="font-size:11px;color:var(--ink3)">Repete toda semana</div></div>`;
  } else {
    const wk=weekKey(wkOffset);
    const goal=weekPlannedHrs(wkOffset)||((S.cfg.metaHrs||3)*5);
    let done=0;
    for(let d=0;d<7;d++){
      const bl=_resolveBlocks(wk,String(d));
      bl.forEach(b=>{
        if((b.type==='study'||b.type==='review'||b.type==='exercise'||b.type==='notes')&&S.wdone[_doneKeyForWeek(wk,String(d),b)])done+=dur(b);
      });
    }
    const pct=Math.min(Math.round(done/goal*100),100);
    const fc=pct>=100?'var(--green)':pct>=60?'var(--gold)':'var(--red)';
    sw.innerHTML=`<div class="week-sum"><div class="week-sum-info"><strong>${done.toFixed(1)}h</strong> de <strong>${goal}h</strong></div><div class="week-sum-track"><div class="week-sum-fill" style="width:${pct}%;background:${fc}"></div></div><div class="week-sum-pct">${pct}%</div></div>`;
  }

  // days
  const cont=document.getElementById('days-container');
  cont.innerHTML='';

  for(let d=0;d<7;d++){
    const dateStr=!isBase&&dates[d]?toKey(dates[d]):'';
    const isToday=!isBase&&dateStr===todayStr;
    const blocks=getBlocks(d);
    const sd=String(d);
    const wk=weekKey(wkOffset);
    const dayHrs=isBase?blocks.reduce((s,b)=>s+dur(b),0):blocks.reduce((s,b)=>s+((b.type==='study'||b.type==='review'||b.type==='exercise')&&S.wdone[_doneKeyForWeek(wk,sd,b)]?dur(b):0),0);
    const openKey=isBase?`${activeTab}-${d}`:`week-${wkOffset}-${d}`;
    const isCurrentWeek=wkOffset===0;
    const isOpen=isBase
      ? S.open[openKey]!==false
      : (S.open[openKey]!==undefined ? S.open[openKey] : (isCurrentWeek&&isToday));

    const dayDiv=document.createElement('div');
    dayDiv.className='day-block'+(isToday?' today-day':'');

    const dateDisplay=!isBase&&dates[d]?dates[d].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):'';
    const plannedHrs=blocks.reduce((s,b)=>s+dur(b),0);
    const isSkipped=!isBase&&_isDaySkipped(wk,d);
    const hrsLabel=isBase?`${plannedHrs.toFixed(1)}h planejado`:isSkipped?'dia sem estudo':dayHrs>0?`${dayHrs.toFixed(1)}h concluído · ${plannedHrs.toFixed(1)}h planejado`:blocks.length>0?`${plannedHrs.toFixed(1)}h planejado`:'sem registros';

    if(isSkipped)dayDiv.style.opacity='0.55';

    dayDiv.innerHTML=`
      <div class="day-header" onclick="toggleDay('${openKey}')">
        <div class="day-header-left">
          <div class="day-name-row">
            <div class="day-name">${DAYS[d]}</div>
            ${dateDisplay?`<div class="day-date-str">${dateDisplay}</div>`:''}
            ${isToday?'<div class="today-chip">HOJE</div>':''}
            ${isSkipped?'<div style="background:var(--red2);color:var(--red);border-radius:20px;font-size:10px;padding:2px 7px;font-family:\'DM Mono\',monospace;letter-spacing:.5px">🚫 sem estudo</div>':''}
          </div>
          <div class="day-hrs-badge">${hrsLabel}${isSkipped?'':' · '+blocks.length+' bloco'+(blocks.length!==1?'s':'')}</div>
        </div>
        <div class="day-header-right">
          ${!isBase&&isSkipped?`<button style="font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--ink3);cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.3px" onclick="event.stopPropagation();unskipDay(${d})" title="Restaurar grade base">↺ base</button>`:''}
          ${!isBase&&!isSkipped&&_hasDelta(wk,d)?`<button style="font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--ink3);cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.3px" onclick="event.stopPropagation();restoreBase(${d})" title="Restaurar grade base">↺ base</button>`:''}
          <div class="day-chevron ${isOpen?'open':''}" id="chv-${openKey}">▼</div>
        </div>
      </div>
      <div class="day-body ${isOpen?'open':''}" id="body-${openKey}">
        ${isSkipped
          ? `<div style="text-align:center;padding:16px;color:var(--red);font-size:13px;font-weight:600">🚫 Dia marcado como sem estudo</div>
             <button class="add-slot-btn" style="border-color:var(--red);color:var(--red)" onclick="event.stopPropagation();unskipDay(${d})">↺ Restaurar blocos da grade base</button>`
          : `${blocks.map((b,bi)=>renderSlot(b,bi,d,!isBase)).join('')}
             <button class="add-slot-btn" onclick="openModal(${d})">+ Adicionar bloco</button>
             ${!isBase?`<button class="add-slot-btn" style="margin-top:4px;border-color:var(--red);color:var(--red)" onclick="skipDay(${d})">🚫 Não vou estudar este dia</button>`:''}`
        }
      </div>`;
    cont.appendChild(dayDiv);
  }
}

function toggleDay(key){
  S.open[key]=S.open[key]===false?true:(S.open[key]===true?false:false);
  // if undefined default was open, clicking closes
  if(S.open[key]===undefined)S.open[key]=false;
  persist();
  const body=document.getElementById('body-'+key);
  const chv=document.getElementById('chv-'+key);
  if(body){body.classList.toggle('open');chv.classList.toggle('open',body.classList.contains('open'))}
}

function _hasDelta(wk,d){
  const delta=_getDelta(wk,String(d));
  return delta.deleted.length>0||delta.extra.length>0;
}

function renderSlot(b,bi,dayIdx,weekMode){
  const icons={study:'📖',exercise:'✏️',review:'🔁',rest:'💤',notes:'📝'};
  const labels={study:'Estudo',exercise:'Exercício',review:'Revisão',rest:'Descanso',notes:'Anotações'};
  const sd=String(dayIdx);
  const wk=weekKey(wkOffset);
  const dk=weekMode?_doneKeyForWeek(wk,sd,b):'';
  const isDone=weekMode&&!!S.wdone[dk];
  const needsPDF=weekMode&&b.type==='study'&&!b.pdfName;
  let title;
  if(b.pdfName){
    title=b.pdfName.replace(/\.pdf$/i,'').replace(/_/g,' ').substring(0,45);
  } else if(needsPDF){
    title='Toque para escolher o PDF…';
  } else if(!weekMode&&b.type==='study'&&b.mat){
    title=b.mat;
  } else {
    title=b.desc||'';
  }
  const pdfMat=b.pdfName?(PDFS.find(p=>p.name===b.pdfName)?.mat||''):'';
  const sub=pdfMat||b.mat||'';
  const subColor=sub?COLORS[sub]||'#005f3c':'';
  // encode block id for onclick: use _id for extra blocks, _baseIdx for base blocks
  const slotRef=b._id?`'x-${b._id}'`:(b._baseIdx!==undefined?`'b-${b._baseIdx}'`:`'?'`);
  const onclick=weekMode
    ?(needsPDF?`assignPDF(${dayIdx},${bi})`:`toggleSlotDone(${dayIdx},${slotRef})`)
    :'';
  const titleStyle=needsPDF?'color:var(--ink3);font-style:italic':'';
  const delPdfBtn=weekMode&&b.pdfName
    ?`<button class="slot-del" title="Remover PDF" onclick="event.stopPropagation();delPdf(${sd},${slotRef})">📝🗑</button>`
    :'';
  const delBlockBtn=`<button class="slot-del" title="Remover bloco" onclick="event.stopPropagation();delSlot(${sd},${slotRef})">🗑</button>`;
  const editBaseBtn=!weekMode?`<button class="slot-del" title="Editar bloco" onclick="event.stopPropagation();editBaseBlock(${dayIdx},${bi})">📝</button>`:'';
  const editWeekBtn=weekMode&&(b.type==='review'||b.type==='exercise'||b.type==='notes')?`<button class="slot-del" title="Editar bloco" onclick="event.stopPropagation();editWeekBlock(${dayIdx},${bi})">📝</button>`:'';
  return`<div class="slot-item ${b.type}${isDone?' done-slot':''}" onclick="${onclick}">
    <div class="slot-left">
      <div class="slot-type-label">${icons[b.type]} ${labels[b.type]}</div>
      <div class="slot-time">${b.start} – ${b.end} · ${dur(b).toFixed(1)}h</div>
      <div class="slot-title" style="${titleStyle}">${title||'—'}</div>
      ${sub?`<div class="slot-mat" style="background:${subColor}">${sub}</div>`:''}
    </div>
    <div class="slot-right">
      <div class="slot-done-icon">${isDone?'✅':(needsPDF?'📝':'')}</div>
      ${editBaseBtn}
      ${editWeekBtn}
      ${delPdfBtn}
      ${delBlockBtn}
    </div>
  </div>`;
}

function _findBlock(dayIdx,slotRef){
  // slotRef: 'b-N' for base block, 'x-ID' for extra block
  dayIdx=String(dayIdx);
  const wk=weekKey(wkOffset);
  const delta=_getDelta(wk,dayIdx);
  if(typeof slotRef==='string'&&slotRef.startsWith('x-')){
    const id=slotRef.slice(2);
    return delta.extra.find(b=>b._id===id)||null;
  } else if(typeof slotRef==='string'&&slotRef.startsWith('b-')){
    const idx=parseInt(slotRef.slice(2));
    const base=S.base[dayIdx]||[];
    return base[idx]?{...base[idx],_baseIdx:idx}:null;
  }
  return null;
}

function toggleSlotDone(dayIdx,slotRef){
  const sd=String(dayIdx);
  const b=_findBlock(sd,slotRef);
  if(!b)return;
  const wk=weekKey(wkOffset),dk=_doneKeyForWeek(wk,sd,b);
  S.wdone[dk]=!S.wdone[dk];
  if(!S.wdone[dk])delete S.wdone[dk];
  toast(S.wdone[dk]?'✅ Horas registradas!':'↩ Desmarcado');
  persist();renderWeek();
}

function delPdf(dayIdx,slotRef){
  dayIdx=String(dayIdx);
  const wk=weekKey(wkOffset);
  const delta=_getDelta(wk,dayIdx);
  if(typeof slotRef==='string'&&slotRef.startsWith('x-')){
    const id=slotRef.slice(2);
    const b=delta.extra.find(b=>b._id===id);
    if(b){b.pdfName='';b.desc='';}
  } else if(typeof slotRef==='string'&&slotRef.startsWith('b-')){
    // create override for this base block
    const idx=parseInt(slotRef.slice(2));
    const base=(S.base[dayIdx]||[])[idx];
    if(base){
      // remove base block from view and add modified copy as extra
      if(!delta.deleted.includes(idx))delta.deleted.push(idx);
      delta.extra.push({...base,_id:_newId(),pdfName:'',desc:''});
    }
  }
  _setDelta(wk,dayIdx,delta);persist();renderWeek();toast('PDF removido');
}

function delSlot(dayIdx,slotRef){
  dayIdx=String(dayIdx);
  if(activeTab==='week'){
    const wk=weekKey(wkOffset);
    const delta=_getDelta(wk,dayIdx);
    if(typeof slotRef==='string'&&slotRef.startsWith('x-')){
      const id=slotRef.slice(2);
      delta.extra=delta.extra.filter(b=>b._id!==id);
    } else if(typeof slotRef==='string'&&slotRef.startsWith('b-')){
      const idx=parseInt(slotRef.slice(2));
      if(!delta.deleted.includes(idx))delta.deleted.push(idx);
    }
    delta.extra.sort((a,b)=>t2m(a.start)-t2m(b.start));
    _setDelta(wk,dayIdx,delta);persist();renderWeek();toast('Bloco removido desta semana');
  } else {
    // grade base: remove by positional index (slotRef='b-N' or bi number)
    const idx=typeof slotRef==='string'&&slotRef.startsWith('b-')?parseInt(slotRef.slice(2)):parseInt(slotRef);
    const bl=[...(S.base[dayIdx]||[])];bl.splice(idx,1);
    setBlocks(dayIdx,bl);renderWeek();toast('Bloco removido da grade base');
  }
}

function restoreBase(dayIdx){
  dayIdx=String(dayIdx);
  const wk=weekKey(wkOffset);
  if(S.weeks[wk])delete S.weeks[wk][dayIdx];
  persist();renderWeek();toast('↺ Grade base restaurada');
}

// ── SKIP DAY ────────────────────────────────────────────────────────────────
function _isDaySkipped(wk,dayIdx){
  dayIdx=String(dayIdx);
  return !!(S.weeks[wk]&&S.weeks[wk][dayIdx]&&S.weeks[wk][dayIdx].skipped);
}

function _calIsVisible(){
  const p=document.getElementById('p-cal');
  return p&&!p.classList.contains('hidden');
}

function skipDay(dayIdx,wkOff){
  dayIdx=String(dayIdx);
  const wk=weekKey(wkOff!==undefined?wkOff:wkOffset);
  const base=S.base[dayIdx]||[];
  if(!S.weeks[wk])S.weeks[wk]={};
  S.weeks[wk][dayIdx]={deleted:base.map((_,i)=>i),extra:[],skipped:true};
  persist();
  const pWeek=document.getElementById('p-week');
  if(pWeek&&!pWeek.classList.contains('hidden'))renderWeek();
  if(_calIsVisible())renderCal();
  toast('🚫 Dia marcado como sem estudo');
}

function unskipDay(dayIdx,wkOff){
  dayIdx=String(dayIdx);
  const wk=weekKey(wkOff!==undefined?wkOff:wkOffset);
  if(S.weeks[wk])delete S.weeks[wk][dayIdx];
  persist();
  const pWeek=document.getElementById('p-week');
  if(pWeek&&!pWeek.classList.contains('hidden'))renderWeek();
  if(_calIsVisible())renderCal();
  toast('↺ Blocos restaurados');
}

// ── CALENDÁRIO ──────────────────────────────────────────────────────────────
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth(),calSelDate=null;

function calChangeMonth(dir){
  if(dir===0){calYear=new Date().getFullYear();calMonth=new Date().getMonth();}
  else{calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}}
  calSelDate=null;
  renderCal();
}

function _dateToWkKey(dt){
  const d=new Date(dt);d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay());
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function _wkOffsetForDate(dt){
  const todaySun=new Date();todaySun.setHours(0,0,0,0);todaySun.setDate(todaySun.getDate()-todaySun.getDay());
  const dtSun=new Date(dt);dtSun.setHours(0,0,0,0);dtSun.setDate(dt.getDate()-dt.getDay());
  return Math.round((dtSun-todaySun)/86400000/7);
}

function renderCal(){
  const today=new Date();today.setHours(0,0,0,0);
  const todayKey=toKey(today);
  const monthName=new Date(calYear,calMonth,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  document.getElementById('cal-month-label').textContent=monthName.charAt(0).toUpperCase()+monthName.slice(1);

  const dows=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let g='<div class="cal-grid">';
  dows.forEach(d=>{g+=`<div class="cal-dow">${d}</div>`;});

  const firstDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  for(let i=0;i<firstDow;i++) g+=`<div class="cal-cell other-month"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const dt=new Date(calYear,calMonth,day);dt.setHours(0,0,0,0);
    const dtKey=toKey(dt);
    const dayIdx=String(dt.getDay());
    const wk=_dateToWkKey(dt);
    const baseBlocks=S.base[dayIdx]||[];
    const resolved=_resolveBlocks(wk,dayIdx);
    const isSkipped=_isDaySkipped(wk,dayIdx);
    const isToday=dtKey===todayKey;
    const isSel=calSelDate===dtKey;

    const planned=resolved.reduce((s,b)=>s+((b.type==='study'||b.type==='review'||b.type==='exercise'||b.type==='notes')?dur(b):0),0);
    const done=resolved.reduce((s,b)=>{
      if(b.type!=='study'&&b.type!=='review'&&b.type!=='exercise'&&b.type!=='notes')return s;
      return s+(S.wdone[_doneKeyForWeek(wk,dayIdx,b)]?dur(b):0);
    },0);
    const allDone=planned>0&&done>=planned&&!isSkipped;
    const hasBlocks=!isSkipped&&planned>0;

    let cls='cal-cell';
    if(!baseBlocks.length&&!isSkipped) cls+=' no-base';
    if(isSkipped) cls+=' skipped';
    else if(allDone) cls+=' all-done';
    else if(hasBlocks) cls+=' has-blocks';
    if(isToday) cls+=' today';
    if(isSel) cls+=' selected';

    const hrsText=isSkipped?'🚫':planned>0?planned.toFixed(1)+'h':'';
    g+=`<div class="${cls}" onclick="calSelectDay('${dtKey}')">
      <span>${day}</span>
      ${hrsText?`<span class="cal-hrs">${hrsText}</span>`:''}
    </div>`;
  }

  const lastDow=new Date(calYear,calMonth,daysInMonth).getDay();
  for(let i=lastDow+1;i<7;i++) g+=`<div class="cal-cell other-month"></div>`;
  g+='</div>';
  document.getElementById('cal-grid').innerHTML=g;

  const panel=document.getElementById('cal-day-panel');
  if(calSelDate) _renderCalPanel(calSelDate);
  else panel.style.display='none';
}

function calSelectDay(dtKey){
  calSelDate=calSelDate===dtKey?null:dtKey;
  renderCal();
}

function _renderCalPanel(dtKey){
  const panel=document.getElementById('cal-day-panel');
  const dt=new Date(dtKey+'T00:00:00');
  const dayIdx=String(dt.getDay());
  const wk=_dateToWkKey(dt);
  const wkOff=_wkOffsetForDate(dt);
  const isSkipped=_isDaySkipped(wk,dayIdx);
  const resolved=_resolveBlocks(wk,dayIdx);
  const planned=resolved.reduce((s,b)=>s+((b.type==='study'||b.type==='review'||b.type==='exercise'||b.type==='notes')?dur(b):0),0);
  const dateLabel=dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  const icons={study:'📖',review:'🔁',exercise:'✏️',rest:'💤',notes:'📝'};
  const labels={study:'Estudo',review:'Revisão',exercise:'Exercício',rest:'Descanso',notes:'Anotações'};

  let html=`<div class="card"><div class="card-body" style="padding:14px">`;
  html+=`<div style="font-size:13px;font-weight:700;margin-bottom:10px;text-transform:capitalize">${dateLabel}</div>`;

  if(isSkipped){
    html+=`<div style="color:var(--red);font-size:13px;font-weight:600;margin-bottom:12px">🚫 Dia marcado como sem estudo</div>`;
    html+=`<button class="btn" style="margin-bottom:0" onclick="unskipDay(${dayIdx},${wkOff});calSelDate='${dtKey}';renderCal()">↺ Restaurar blocos da grade base</button>`;
  } else if(!S.base[dayIdx]||!S.base[dayIdx].length){
    html+=`<div style="color:var(--ink3);font-size:13px">Nenhum bloco na grade base para este dia da semana.</div>`;
  } else {
    html+=`<div style="font-size:12px;color:var(--ink3);margin-bottom:10px">${planned.toFixed(1)}h planejado · ${resolved.length} bloco${resolved.length!==1?'s':''}</div>`;
    resolved.forEach(b=>{
      const dk=_doneKeyForWeek(wk,dayIdx,b);
      const isDone=!!S.wdone[dk];
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:15px">${icons[b.type]||'📌'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600">${labels[b.type]} · ${b.start}–${b.end} · ${dur(b).toFixed(1)}h</div>
          ${b.pdfName?`<div style="font-size:10px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.pdfName.replace(/\.pdf$/i,'')}</div>`:''}
        </div>
        ${isDone?'<span style="color:var(--green);font-size:16px">✅</span>':''}
      </div>`;
    });
    html+=`<button class="btn btn-danger" style="margin-top:12px;margin-bottom:0" onclick="skipDay(${dayIdx},${wkOff});calSelDate='${dtKey}';renderCal()">🚫 Não vou estudar este dia</button>`;
  }

  html+=`</div></div>`;
  panel.innerHTML=html;
  panel.style.display='block';
}

function _populatePDFSelect(filterMat){
  const sel=document.getElementById('m-pdf');
  sel.innerHTML='<option value="">— Selecione —</option>';
  const pool=filterMat?PDFS.filter(p=>p.mat===filterMat):PDFS;
  pool.filter(p=>!S.done[p.name]).forEach(p=>{
    const o=document.createElement('option');o.value=p.name;
    o.textContent=p.name.replace(/\.pdf$/i,'').replace(/_/g,' ').substring(0,46)+` (${fmtH(p.mins)})`;
    sel.appendChild(o);
  });
  const done=pool.filter(p=>S.done[p.name]);
  if(done.length){
    const og=document.createElement('optgroup');og.label='— Concluídos —';
    done.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=p.name.replace(/\.pdf$/i,'').replace(/_/g,' ').substring(0,46);og.appendChild(o)});
    sel.appendChild(og);

function addBlock(){
  const start=getTimeVal('start'),end=getTimeVal('end');
  if(!start||!end||t2m(end)<=t2m(start)){toast('⚠️ Horário inválido');return}

  const isBase=modalCtx&&modalCtx.isBase;
  const editIdx=modalCtx?.editIdx;
  let pdfName='',desc='',mat='';

  if(isBase){
    mat=document.getElementById('m-mat').value;
    if(selType2==='study'&&!mat){toast('⚠️ Selecione a matéria para o bloco de estudo');return}
  } else {
    if(selType2==='study'){
      mat=document.getElementById('m-week-mat').value;
      pdfName=document.getElementById('m-pdf').value;
      if(!pdfName){toast('⚠️ Selecione um PDF');return}
      if(!mat)mat=(PDFS.find(p=>p.name===pdfName)||{}).mat||'';
    } else if(selType2!=='rest'){
      // exercício e revisão: matéria opcional, sem obrigar descrição
      mat=document.getElementById('m-week-mat').value;
      desc=document.getElementById('m-desc').value.trim();
    }
  }

  const bl=[...getBlocks(modalCtx.dayIdx)];
  if(isBase){
    if(editIdx!=null&&bl[editIdx]){
      bl[editIdx]={...bl[editIdx],type:selType2,pdfName,desc,mat,start,end};
    } else {
      bl.push({type:selType2,start,end,pdfName,desc,mat});
    }
    bl.sort((a,b)=>t2m(a.start)-t2m(b.start));
    setBlocks(modalCtx.dayIdx,bl);
  } else {
    // week mode: add/edit in delta.extra
    const wk=weekKey(wkOffset);
    const dayIdx=String(modalCtx.dayIdx);
    const delta=_getDelta(wk,dayIdx);
    if(editIdx!=null){
      // editIdx here is the slotRef string from assignPDF
      const ref=modalCtx.slotRef;
      if(ref&&ref.startsWith('x-')){
        const id=ref.slice(2);
        const ex=delta.extra.find(b=>b._id===id);
        if(ex){ex.type=selType2;ex.pdfName=pdfName;ex.desc=desc;ex.mat=mat;ex.start=start;ex.end=end;}
      } else if(ref&&ref.startsWith('b-')){
        const idx=parseInt(ref.slice(2));
        const base=(S.base[dayIdx]||[])[idx];
        if(base){
          if(!delta.deleted.includes(idx))delta.deleted.push(idx);
          delta.extra.push({...base,type:selType2,_id:_newId(),pdfName,desc,mat,start,end});
        }
      }
    } else {
      delta.extra.push({type:selType2,start,end,pdfName,desc,mat,_id:_newId()});
    }
    delta.extra.sort((a,b)=>t2m(a.start)-t2m(b.start));
    _setDelta(wk,dayIdx,delta);persist();
  }
  closeModal();renderWeek();toast(editIdx!=null?'✓ PDF atribuído!':'✓ Adicionado!');
}

  document.getElementById('modal').classList.remove('open');
  document.querySelectorAll('.type-pill').forEach(p=>p.disabled=false);
}

// ═══ PDFs ════════════════════════════════════════════════════════
function renderPDFs(){
  const q=(document.getElementById('pdf-q')?.value||'').toLowerCase();
  const mat=document.getElementById('pdf-mat')?.value||'';
  const st=document.getElementById('pdf-st')?.value||'';
  const sel=document.getElementById('pdf-mat');
  if(sel&&sel.options.length===1)MATS.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
  const cont=document.getElementById('pdf-cont');cont.innerHTML='';
  const grouped={};
  PDFS.forEach(p=>{
    if(mat&&p.mat!==mat)return;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.mat.toLowerCase().includes(q))return;
    if(st==='done'&&!S.done[p.name])return;
    if(st==='pending'&&S.done[p.name])return;
    if(!grouped[p.mat])grouped[p.mat]=[];
    grouped[p.mat].push(p);
  });
  Object.keys(grouped).sort().forEach(m=>{
    const pdfs=grouped[m],dn=pdfs.filter(p=>S.done[p.name]).length,pct=Math.round(dn/pdfs.length*100),c=COLORS[m]||'#005f3c';
    const minsLeft=pdfs.filter(p=>!S.done[p.name]).reduce((s,p)=>s+p.mins,0);
    const hrsLeft=minsLeft>0?fmtH(minsLeft):'';
    const k='ms-'+btoa(encodeURIComponent(m)).replace(/[^a-zA-Z0-9]/g,'');
    const wrap=document.createElement('div');wrap.className='mat-section';
    wrap.innerHTML=`
      <div class="mat-hdr" onclick="toggleMs('${k}')">
        <div class="mat-swatch" style="background:${c}"></div>
        <div class="mat-hdr-name">${m}</div>
        ${hrsLeft?`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)">${hrsLeft}</span>`:''}
        <span class="mat-hdr-badge">${dn}/${pdfs.length}</span>
        <span class="mat-hdr-pct">${pct}%</span>
      </div>
      <div class="pdf-rows-wrap" id="${k}" style="display:none">
        ${pdfs.map(p=>{
          const dn2=!!S.done[p.name];
          return`<div class="pdf-row${dn2?' done-row':''}">
            <div class="chk${dn2?' on':''}" onclick="togDone('${p.name.replace(/'/g,"\\'")}')">
              ${dn2?'✓':''}
            </div>
            <div class="pdf-info">
              <div class="pdf-name">${p.name.replace(/\.pdf$/i,'').replace(/_/g,' ')}</div>
              <div class="pdf-meta">${p.pages} pág · ${fmtH(p.mins)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    cont.appendChild(wrap);
  });
}
function toggleMs(k){const el=document.getElementById(k);if(el)el.style.display=el.style.display==='none'?'':'none'}
function togDone(name){S.done[name]=!S.done[name];if(!S.done[name])delete S.done[name];persist();renderPDFs();toast(S.done[name]?'✓ Concluído!':'Desmarcado')}

// ═══ CHECKLIST ══════════════════════════════════════════════════
function renderChecklist(){
  document.getElementById('ck-cont').innerHTML=Object.entries(TOPICS).map(([m,topics])=>{
    const c=COLORS[m]||'#005f3c';
    const dn=topics.filter(t=>S.checked[m+'::'+t]).length,pct=Math.round(dn/topics.length*100);
    const k='ck-'+btoa(encodeURIComponent(m)).replace(/[^a-zA-Z0-9]/g,'');
    return`<div class="ck-card">
      <div class="ck-head" onclick="toggleCkBody('${k}')">
        <div class="ck-swatch" style="background:${c}"></div>
        <div class="ck-title">${m}</div>
        <div class="ck-pct">${pct}%</div>
      </div>
      <div class="ck-prog-bar"><div class="ck-prog-fill" style="width:${pct}%;background:${c}"></div></div>
      <div class="ck-body" id="${k}">
        ${topics.map(t=>{const done=!!S.checked[m+'::'+t];return`<div class="ck-item${done?' done':''}" onclick="togCk('${m.replace(/'/g,"\\'")}','${t.replace(/'/g,"\\'")}')"><div class="chk${done?' on':''}" style="width:18px;height:18px;flex-shrink:0;margin-top:1px;font-size:11px">${done?'✓':''}</div><div class="ck-text">${t}</div></div>`}).join('')}
      </div>
    </div>`;
  }).join('');
}
function toggleCkBody(k){const el=document.getElementById(k);if(el)el.classList.toggle('open')}
function togCk(m,t){const k=m+'::'+t;S.checked[k]=!S.checked[k];if(!S.checked[k])delete S.checked[k];persist();renderChecklist()}

// ═══ CONFIG ══════════════════════════════════════════════════════
function renderConfig(){
  document.getElementById('cfg-start').value=S.cfg.startDate||'';
  document.getElementById('cfg-date').value=S.cfg.examDate||'';
  document.getElementById('cfg-hrs').value=S.cfg.metaHrs||3;
}
function saveConfig(){
  S.cfg.startDate=document.getElementById('cfg-start')?.value||S.cfg.startDate;
  S.cfg.examDate=document.getElementById('cfg-date')?.value||S.cfg.examDate;
  S.cfg.metaHrs=parseFloat(document.getElementById('cfg-hrs')?.value||3);
  persist();updateTopbar();
}
function debugState(){
  const info=`S.base keys: ${JSON.stringify(Object.keys(S.base))}\nS.base: ${JSON.stringify(S.base,null,2)}\nweekKey: ${weekKey(0)}`;
  alert(info);
}
function clearAll(){S.done={};S.weeks={};S.wdone={};S.checked={};persist();toast('✓ Dados limpos!');renderDash()}

// ═══ TOAST ══════════════════════════════════════════════════════
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// ═══ INIT ═══════════════════════════════════════════════════════
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});

// ═══ TIME SELECT HELPERS ════════════════════════════════════════
function _populateTimeSelects(){
  ['start','end'].forEach(id=>{
    const hSel=document.getElementById('m-'+id+'-h');
    const mSel=document.getElementById('m-'+id+'-m');
    if(hSel.options.length>0)return;
    for(let h=0;h<24;h++){const o=document.createElement('option');o.value=String(h).padStart(2,'0');o.textContent=String(h).padStart(2,'0')+'h';hSel.appendChild(o);}
    ['00','15','30','45'].forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=':'+m;mSel.appendChild(o);});
  });
  setTimeVal('start','08:00');
  setTimeVal('end','10:00');
}
function getTimeVal(id){
  const h=document.getElementById('m-'+id+'-h').value;
  const m=document.getElementById('m-'+id+'-m').value;
  return h+':'+m;
}
function setTimeVal(id,val){
  if(!val)return;
  const [h,m]=val.split(':');
  const hSel=document.getElementById('m-'+id+'-h');
  const mSel=document.getElementById('m-'+id+'-m');
  hSel.value=h;
  // snap minutes to nearest 15
  const mn=parseInt(m||0);
  const snapped=mn<8?'00':mn<23?'15':mn<38?'30':mn<53?'45':'00';
  mSel.value=snapped;
}
_populateTimeSelects();
